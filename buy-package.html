// ============================================================
// UTILITY FUNCTIONS
// ============================================================
function roundTo8(value) {
    if (value === undefined || value === null || isNaN(value)) return 0;
    return parseFloat(Math.round(value * 100000000) / 100000000);
}

function formatDate(timestamp) {
    if (!timestamp) return 'N/A';
    return new Date(timestamp).toLocaleString('en-IN', {
        day: '2-digit',
        month: 'short',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
    });
}

function showToast(message, type = 'success', duration = 5000) {
    const container = document.getElementById('toastContainer');
    if (!container) return;
    const toast = document.createElement('div');
    toast.className = `toast-custom ${type}`;
    const icons = {
        success: 'bi-check-circle-fill text-success',
        error: 'bi-exclamation-triangle-fill text-danger',
        info: 'bi-info-circle-fill text-info'
    };
    toast.innerHTML = `<i class="bi ${icons[type] || icons.success}" aria-hidden="true"></i><span class="toast-msg">${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(100%)';
        setTimeout(() => toast.remove(), 300);
    }, duration);
}

async function getRNDPrice() {

        const rateSnap = await get(ref(db, 'settings/rate'));
        if (rateSnap.exists()) {

            return 1.00;

    } catch (error) {
        console.error('Error fetching RND price:', error);
        return 1.00;

}

function calculateStaking(usdtAmount, rndPrice, plan) {
    if (!usdtAmount || usdtAmount <= 0 || !rndPrice || rndPrice <= 0 || !plan) {
        return { baseRND: 0, bonusRND: 0, totalRND: 0, dailyRelease: 0, bonusPercent: plan ? plan.bonus : 0, planDays: plan ? plan.days : 0 };
    }
    const baseRND = roundTo8(usdtAmount / rndPrice);
    const bonusRND = roundTo8(baseRND * (plan.bonus / 100));
    const totalRND = roundTo8(baseRND + bonusRND);
    const dailyRelease = roundTo8(totalRND / plan.days);
    return { baseRND, bonusRND, totalRND, dailyRelease, bonusPercent: plan.bonus, planDays: plan.days };
}

function getPackageHistory(userData) {
    if (!userData || !userData.packages) return [];
    const packages = userData.packages || {};
    return Object.keys(packages).map(key => ({ id: key, ...packages[key] }))
        .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
}

function checkDuplicatePurchase(userData, planId, amount, timestamp) {
    if (!userData || !userData.packages) return false;
    const packages = userData.packages || {};
    const windowMs = 10000;
    for (let key in packages) {
        const pkg = packages[key];
        if (pkg.planId === planId && 
            Math.abs((pkg.timestamp || 0) - timestamp) < windowMs &&
            Math.abs((pkg.usdtAmount || 0) - amount) < 0.01) {
            return true;
        }
    }
    return false;
}

// ============================================================
// ATOMIC PURCHASE
// ============================================================
async function processAtomicPurchase(uid, plan, payAmount, payFrom, result, rndPrice) {
    const userRef = ref(db, 'users/' + uid);
    const packageId = 'pkg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    const timestamp = Date.now();
    const date = new Date().toDateString();
    
    try {
        const userSnap = await get(ref(db, 'users/' + uid));
        if (!userSnap.exists()) {
            return { success: false, error: 'User not found' };
        }
        const userData = userSnap.val();
        const currentBalance = userData[payFrom] || 0;
        if (currentBalance < payAmount) {
            return { success: false, error: 'Insufficient balance', balance: currentBalance, needed: payAmount };
        }
        
        const txResult = await runTransaction(userRef, (currentData) => {
            if (!currentData) return { ...currentData };
            const balance = currentData[payFrom] || 0;
            if (balance < payAmount) return null;
            
            const packages = currentData.packages || {};
            packages[packageId] = {
                planId: plan.id, planName: plan.name, usdtAmount: payAmount,
                totalRND: result.totalRND, remainingRND: result.totalRND, releasedRND: 0,
                dailyRelease: result.dailyRelease, planDays: plan.days, bonusPercent: plan.bonus,
                status: 'active', purchaseDate: timestamp, rndPriceAtTime: rndPrice || 1, timestamp: timestamp
            };
            
            const newBalance = roundTo8(balance - payAmount);
            const newLocked = roundTo8((currentData.lockedRND || 0) + result.totalRND);
            const totalStake = roundTo8((currentData.totalStake || 0) + payAmount);
            
            const transactions = currentData.transactions || {};
            const txId = 'tx_' + timestamp + '_' + Math.random().toString(36).substr(2, 8);
            transactions[txId] = {
                type: 'package', packageId: packageId, amount: payAmount, currency: 'USDT',
                rndReceived: result.totalRND, planName: plan.name, dailyRelease: result.dailyRelease,
                planDays: plan.days, bonusPercent: plan.bonus, timestamp: timestamp, date: date,
                status: 'completed', description: `Purchased ${plan.name} - ${result.totalRND.toFixed(2)} RND locked`
            };
            
            return { ...currentData, [payFrom]: newBalance, packages: packages, lockedRND: newLocked, totalStake: totalStake, transactions: transactions };
        });
        
        if (txResult.committed && txResult.snapshot && txResult.snapshot.exists()) {
            return { success: true, packageId: packageId };
        } else {
            return { success: false, error: txResult.error || 'Transaction aborted - insufficient balance' };
        }
    } catch (error) {
        console.error('Atomic purchase error:', error);
        return { success: false, error: error.message };
    }
}

// ============================================================
// COMMISSION - 5 LEVELS
// ============================================================
async function distributeReferralCommission(userUid, amount, rndPriceAtTime, packageId) {
    try {
        const timestamp = Date.now();
        const date = new Date().toDateString();
        const COMMISSION_RATES = [0.08, 0.04, 0.02, 0.01, 0.01];
        const LEVEL_NAMES = ['Level 1 (8%)', 'Level 2 (4%)', 'Level 3 (2%)', 'Level 4 (1%)', 'Level 5 (1%)'];
        
        const usersSnap = await get(ref(db, 'users'));
        if (!usersSnap.exists()) return { totalCommission: 0, commissionCount: 0 };
        const users = usersSnap.val();
        const currentUser = users[userUid];
        if (!currentUser) return { totalCommission: 0, commissionCount: 0 };
        
        let currentRefCode = currentUser.referredBy || '';
        let totalCommission = 0;
        let commissionCount = 0;
        let sponsors = [];
        
        for (let level = 0; level < 5; level++) {
            if (!currentRefCode) break;
            let sponsorUid = null, sponsor = null;
            for (const uid in users) {
                if (users[uid].referralCode === currentRefCode) {
                    sponsorUid = uid; sponsor = users[uid]; break;
                }
            }
            if (!sponsorUid || !sponsor) break;
            
            const commissionUSDT = roundTo8(amount * COMMISSION_RATES[level]);
            totalCommission = roundTo8(totalCommission + commissionUSDT);
            commissionCount++;
            sponsors.push({ uid: sponsorUid, data: sponsor, level: level + 1, commission: commissionUSDT, levelName: LEVEL_NAMES[level] });
            currentRefCode = sponsor.referredBy || '';
        }
        
        if (sponsors.length === 0) return { totalCommission: 0, commissionCount: 0 };
        
        let successCount = 0;
        for (const sponsor of sponsors) {
            try {
                const sponsorRef = ref(db, 'users/' + sponsor.uid);
                const result = await runTransaction(sponsorRef, (currentData) => {
                    if (!currentData) return { ...currentData };
                    const newReferralEarnings = roundTo8((currentData.referralEarnings || 0) + sponsor.commission);
                    const newReferralWallet = roundTo8((currentData.referralWallet || 0) + sponsor.commission);
                    const newTeamBusiness = roundTo8((currentData.teamBusiness || 0) + amount);
                    const newTotalReferralCommission = roundTo8((currentData.totalReferralCommission || 0) + sponsor.commission);
                    const newLevelEarnings = roundTo8((currentData[`level${sponsor.level}Earnings`] || 0) + sponsor.commission);
                    
                    const transactions = currentData.transactions || {};
                    const txId = 'tx_' + timestamp + '_' + Math.random().toString(36).substr(2, 8);
                    transactions[txId] = {
                        type: 'referral_commission', level: sponsor.level, amount: sponsor.commission,
                        currency: 'USDT', fromUser: currentUser.username || userUid, packageId: packageId,
                        rate: rndPriceAtTime, timestamp: timestamp, date: date, status: 'completed',
                        description: `${sponsor.levelName} commission from package purchase`
                    };
                    
                    return { ...currentData, referralEarnings: newReferralEarnings, referralWallet: newReferralWallet,
                        teamBusiness: newTeamBusiness, totalReferralCommission: newTotalReferralCommission,
                        [`level${sponsor.level}Earnings`]: newLevelEarnings, transactions: transactions };
                });
                if (result.committed) successCount++;
            } catch (err) {
                console.error(`Error in level ${sponsor.level} commission:`, err);
            }
        }
        return { totalCommission: roundTo8(totalCommission), commissionCount: commissionCount, successCount: successCount, failedCount: sponsors.length - successCount };
    } catch (error) {
        console.error('Error distributing referral commission:', error);
        return { totalCommission: 0, commissionCount: 0, error: error.message };
    }
}

                            <p>No packages purchased yet.</p>
                        </div>
                    ` : `<div class="package-history">${packagesHtml}</div>`}
                </div>
            </div>
        </div>
    `;
}

// ============================================================
// ATTACH LISTENERS
// ============================================================
let purchaseInProgress = false;

function attachListeners(userId, userData, rndPrice) {
    document.querySelectorAll('.plan-cta').forEach(btn => {
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            if (purchaseInProgress) {
                showToast('⏳ Purchase in progress. Please wait.', 'info');
                return;
            }
            const planId = this.dataset.planId;
            const plan = PLANS.find(p => p.id === planId);
            if (!plan) return;
            document.querySelectorAll('.package-card').forEach(c => c.classList.remove('selected'));
            const parentCard = this.closest('.package-card');
            if (parentCard) parentCard.classList.add('selected');
            document.getElementById('selectedPlan').value = plan.name;
            document.getElementById('payAmount').value = plan.minAmount;
            document.getElementById('payAmount').min = plan.minAmount;
            const result = calculateStaking(plan.minAmount, rndPrice || 1, plan);
            document.getElementById('totalRNDDisplay').value = result.totalRND.toFixed(2) + ' RND';
            document.getElementById('dailyReleaseDisplay').value = result.dailyRelease.toFixed(4) + ' RND';
            document.getElementById('buyBtn').innerHTML = `<i class="bi bi-check-circle me-1"></i>Buy ${plan.name}`;
        });
    });

    const payAmountInput = document.getElementById('payAmount');
    if (payAmountInput) {
        payAmountInput.addEventListener('input', function() {
            const planName = document.getElementById('selectedPlan').value;
            if (planName === 'None') {
                document.getElementById('totalRNDDisplay').value = '0 RND';
                document.getElementById('dailyReleaseDisplay').value = '0 RND';
                return;
            }
            const plan = PLANS.find(p => p.name === planName);
            if (!plan) return;
            const amount = parseFloat(this.value);
            if (!amount || amount < plan.minAmount) {
                document.getElementById('totalRNDDisplay').value = '0 RND';
                document.getElementById('dailyReleaseDisplay').value = '0 RND';
                return;
            }
            const result = calculateStaking(amount, rndPrice || 1, plan);
            document.getElementById('totalRNDDisplay').value = result.totalRND.toFixed(2) + ' RND';
            document.getElementById('dailyReleaseDisplay').value = result.dailyRelease.toFixed(4) + ' RND';
        });
    }

    const buyForm = document.getElementById('buyForm');
    if (buyForm) {
        buyForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (purchaseInProgress) {
                showToast('⏳ Purchase already in progress. Please wait...', 'info');
                return;
            }
            
            const planName = document.getElementById('selectedPlan').value;
            let payAmount = parseFloat(document.getElementById('payAmount').value);
            const payFrom = document.getElementById('payFrom').value;
            const buyBtn = document.getElementById('buyBtn');

            if (!planName || planName === 'None') { 
                showToast('❌ Please select a plan first!', 'error'); 
                return; 
            }
            const plan = PLANS.find(p => p.name === planName);
            if (!plan) { 
                showToast('❌ Invalid plan selected!', 'error'); 
                return; 
            }
            if (!payAmount || payAmount < plan.minAmount) { 
                showToast(`❌ Minimum investment for ${plan.name} is $${plan.minAmount} USDT!`, 'error'); 
                return; 
            }
            
            const balance = userData[payFrom] || 0;
            if (balance < payAmount) {
                showToast(`❌ Insufficient balance! You have $${balance.toFixed(2)}, need $${payAmount.toFixed(2)}`, 'error');
                return;
            }

            purchaseInProgress = true;
            buyBtn.disabled = true;
            buyBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Processing...';

            try {
                const result = calculateStaking(payAmount, rndPrice || 1, plan);
                const isDuplicate = checkDuplicatePurchase(userData, plan.id, payAmount, Date.now());
                if (isDuplicate) {
                    showToast('⚠️ Duplicate purchase detected. Please wait a moment.', 'error');
                    purchaseInProgress = false;
                    buyBtn.disabled = false;
                    buyBtn.innerHTML = `<i class="bi bi-check-circle me-1"></i>Buy ${planName}`;
                    return;
                }
                
                const purchaseResult = await processAtomicPurchase(userId, plan, payAmount, payFrom, result, rndPrice);
                if (!purchaseResult.success) {
                    showToast('❌ ' + (purchaseResult.error || 'Purchase failed!'), 'error');
                    purchaseInProgress = false;
                    buyBtn.disabled = false;
                    buyBtn.innerHTML = `<i class="bi bi-check-circle me-1"></i>Buy ${planName}`;
                    return;
                }
                
                try {
                    await distributeReferralCommission(userId, payAmount, rndPrice || 1, purchaseResult.packageId);
                } catch (commissionError) {
                    console.warn('Referral commission error (non-critical):', commissionError);
                }

                showToast(`✅ ${plan.name} purchased! ${result.totalRND.toFixed(2)} RND locked. Daily release: ${result.dailyRelease.toFixed(4)} RND from tomorrow.`, 'success');
                buyBtn.classList.add('success-animation');
                setTimeout(() => { window.location.reload(); }, 2500);

            } catch (error) {
                console.error('Purchase error:', error);
                showToast(`❌ Error purchasing plan: ${error.message || 'Please try again.'}`, 'error');
                purchaseInProgress = false;
                buyBtn.disabled = false;
                buyBtn.innerHTML = `<i class="bi bi-check-circle me-1"></i>Buy ${planName}`;
            }
        });
    }
}

// ============================================================
// REAL-TIME WALLET UPDATES
// ============================================================
function updateWalletDisplays(uid) {
    const userRef = ref(db, 'users/' + uid);
    onValue(userRef, (snapshot) => {
        if (snapshot.exists()) {
            const data = snapshot.val();
            const deposit = data.depositWallet || 0;
            const referral = data.referralWallet || 0;
            const rnd = data.rndWallet || 0;
            const locked = data.lockedRND || 0;
            
            const elDeposit = document.getElementById('walletDeposit');
            const elReferral = document.getElementById('walletReferral');
            const elRND = document.getElementById('walletRND');
            const elLocked = document.getElementById('walletLocked');
            
            if (elDeposit) elDeposit.textContent = '$' + deposit.toFixed(2);
            if (elReferral) elReferral.textContent = referral.toFixed(2) + ' USDT';
            if (elRND) elRND.textContent = rnd.toFixed(4) + ' RND';
            if (elLocked) elLocked.textContent = locked.toFixed(2) + ' RND';
        }
    });
}

// ============================================================
// SHOW ERROR
// ============================================================
function showErrorState(container, message) {
    container.innerHTML = `
        <div class="error-state">
            <i class="bi bi-exclamation-triangle" aria-hidden="true"></i>
            <h4>Error Loading Page</h4>
            <p>${message || 'Please check your internet connection.'}</p>
            <button class="btn btn-primary-custom mt-3" onclick="location.reload()" style="width:auto;padding:10px 30px;">
                <i class="bi bi-arrow-clockwise me-1"></i> Refresh
            </button>
        </div>
    `;
}

// ============================================================
// SIDEBAR EVENTS
// ============================================================
const sidebarPanel = document.getElementById('sidebarPanel');
const sidebarOverlay = document.getElementById('sidebarOverlay');
const sidebarToggle = document.getElementById('sidebarToggle');
const sidebarClose = document.getElementById('sidebarClose');

function openSidebar() {
    if (!sidebarPanel || !sidebarOverlay) return;
    sidebarPanel.classList.add('open');
    sidebarOverlay.classList.add('active');
    document.body.style.overflow = 'hidden';
    if (sidebarToggle) sidebarToggle.setAttribute('aria-expanded', 'true');
}

function closeSidebar() {
    if (!sidebarPanel || !sidebarOverlay) return;
    sidebarPanel.classList.remove('open');
    sidebarOverlay.classList.remove('active');
    document.body.style.overflow = '';
    if (sidebarToggle) sidebarToggle.setAttribute('aria-expanded', 'false');
}

if (sidebarToggle) sidebarToggle.addEventListener('click', openSidebar);
if (sidebarClose) sidebarClose.addEventListener('click', closeSidebar);
if (sidebarOverlay) sidebarOverlay.addEventListener('click', closeSidebar);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSidebar(); });

document.getElementById('logoutBtnSidebar')?.addEventListener('click', async (e) => {
    e.preventDefault();
    try {
        await firebaseSignOut(auth);
        window.location.href = 'login.html';
    } catch (error) {
        console.error('Sign out error:', error);
        showToast('❌ Error signing out. Please try again.', 'error');
    }
});

document.getElementById('supportLink')?.addEventListener('click', (e) => {
    e.preventDefault();
    window.open('support.html', '_blank', 'noopener,noreferrer');
});

// ============================================================
// MAIN
// ============================================================
onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = 'login.html';
        return;
    }

    try {
        const price = await getRNDPrice();
        const userData = await getUserData(user.uid);
        if (!userData) {
            window.location.href = 'dashboard.html';
            return;
        }
        
        const username = userData.username || userData.referralCode || 'USER';
        const name = userData.name || 'User';
        updateSidebarUser(name, username, userData.totalReferrals || 0);
        
        const packageHistory = getPackageHistory(userData);
        const container = document.getElementById('packageContent');
        
        renderPackageUI(container, { userData, packageHistory, rndPrice: price });
        attachListeners(user.uid, userData, price);
        updateWalletDisplays(user.uid);

    } catch (error) {
        console.error('Error loading page:', error);
        showErrorState(document.getElementById('packageContent'), error.message || 'Please check your internet connection.');
    }
});
</script>
