<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Buy Package · RND Staking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/buy-package.css">
</head>
<body>

<div id="toastContainer" role="status" aria-live="polite" aria-atomic="true"></div>

<!-- ====== NAVBAR ====== -->
<nav class="navbar-custom" role="navigation" aria-label="Main navigation">
    <div class="container-fluid px-3">
        <a class="navbar-brand" href="dashboard.html" aria-label="RND Staking Home">
            <i class="bi bi-currency-bitcoin me-2" aria-hidden="true"></i>RND Staking
        </a>
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Open menu" aria-expanded="false">
            <i class="bi bi-list" aria-hidden="true"></i>
        </button>
    </div>
</nav>

<!-- ====== SIDEBAR ====== -->
<div class="sidebar-overlay" id="sidebarOverlay" aria-hidden="true"></div>
<aside class="sidebar-panel" id="sidebarPanel" role="navigation" aria-label="Sidebar menu">
    <div class="sidebar-header">
        <h5><i class="bi bi-grid-1x2-fill me-2" aria-hidden="true"></i>Menu</h5>
        <button class="sidebar-close" id="sidebarClose" aria-label="Close menu">
            <i class="bi bi-x-lg" aria-hidden="true"></i>
        </button>
    </div>
    
    <div class="user-profile-sidebar">
        <div class="d-flex align-items-center gap-3">
            <div class="avatar" id="sidebarAvatar" aria-hidden="true">U</div>
            <div>
                <div class="user-name" id="sidebarName">Loading...</div>
                <div class="user-id" id="sidebarUserId">ID: ---</div>
            </div>
        </div>
    </div>
    
    <nav aria-label="Sidebar navigation">
        <a href="dashboard.html" class="nav-item"><i class="bi bi-speedometer2" aria-hidden="true"></i> Dashboard</a>
        <a href="deposit.html" class="nav-item"><i class="bi bi-arrow-down-circle" aria-hidden="true"></i> Deposit</a>
        <a href="withdrawal.html" class="nav-item"><i class="bi bi-arrow-up-circle" aria-hidden="true"></i> Withdraw</a>
        <a href="referrals.html" class="nav-item"><i class="bi bi-people" aria-hidden="true"></i> Referrals <span class="badge" id="referralBadge" style="display:none;">0</span></a>
        <a href="buy-package.html" class="nav-item active" aria-current="page"><i class="bi bi-box-seam" aria-hidden="true"></i> Buy Package</a>
        <a href="transactions.html" class="nav-item"><i class="bi bi-receipt" aria-hidden="true"></i> Transactions</a>
        <a href="invoice.html" class="nav-item"><i class="bi bi-file-text" aria-hidden="true"></i> Invoice</a>
        <a href="profile.html" class="nav-item"><i class="bi bi-person" aria-hidden="true"></i> Profile</a>
        <a href="#" class="nav-item" id="supportLink"><i class="bi bi-headset" aria-hidden="true"></i> Support Center</a>
    </nav>
    
    <div class="sidebar-footer">
        <a href="#" class="nav-item" id="logoutBtnSidebar" role="button" aria-label="Logout">
            <i class="bi bi-box-arrow-right" aria-hidden="true"></i> Logout
        </a>
    </div>
</aside>

<!-- ====== MAIN CONTENT ====== -->
<main class="dashboard-container" id="packageContent" role="main">
    <div class="text-center py-5" id="loadingState">
        <div class="spinner-border text-success" role="status" style="width: 3rem; height: 3rem;">
            <span class="visually-hidden">Loading packages...</span>
        </div>
        <p class="text-muted mt-3">Loading packages...</p>
    </div>
</main>

<!-- ====== SCRIPTS ====== -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

<script type="importmap">
{
    "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
    }
}
</script>

<script type="module">
// ============================================================
// 🔥 IMPORT ALL MODULES
// ============================================================
import { onAuthStateChanged } from './js/auth.js';
import { initSidebar, updateSidebarUser } from './js/sidebar.js';
import { showToast } from './js/toast.js';
import { getRNDPrice, getUserData, formatCurrency } from './js/utils.js';
import { PLANS, calculateStaking } from './js/package-service.js';
import { processPurchase, getPackageHistory } from './js/buy-package.js';
import { renderPackageUI, attachPlanListeners, attachFormListeners, updateWalletDisplays, showErrorState } from './js/package-ui.js';

// ============================================================
// 🔥 MAIN
// ============================================================
onAuthStateChanged(async (user) => {
    if (!user) {
        window.location.href = 'login.html';
        return;
    }

    try {
        // 1. Get RND Price
        const price = await getRNDPrice();
        
        // 2. Get User Data
        const userData = await getUserData(user.uid);
        if (!userData) {
            window.location.href = 'dashboard.html';
            return;
        }
        
        // 3. Update Sidebar
        const username = userData.username || userData.referralCode || 'USER';
        const name = userData.name || 'User';
        updateSidebarUser(name, username, userData.totalReferrals || 0);
        
        // 4. Get Package History
        const packageHistory = getPackageHistory(userData);
        
        // 5. Render UI
        const container = document.getElementById('packageContent');
        renderPackageUI(container, {
            userData,
            packageHistory,
            rndPrice: price,
            plans: PLANS
        });
        
        // 6. Attach Event Listeners
        attachPlanListeners(PLANS, price);
        attachFormListeners({
            userId: user.uid,
            userData: userData,
            rndPrice: price,
            plans: PLANS
        });
        
        // 7. Setup Real-time Wallet Updates
        updateWalletDisplays(user.uid);
        
        // 8. Init Sidebar
        initSidebar();
        
        // 9. Support Link
        document.getElementById('supportLink')?.addEventListener('click', (e) => {
            e.preventDefault();
            window.open('support.html', '_blank', 'noopener,noreferrer');
        });

    } catch (error) {
        console.error('Error loading page:', error);
        showErrorState(
            document.getElementById('packageContent'),
            error.message || 'Please check your internet connection.'
        );
    }
});
</script>
</body>
</html>
