<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Forgot Password · RND Staking</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0e1a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .forgot-wrapper {
            max-width: 400px;
            width: 100%;
            background: #1a2236;
            border-radius: 24px;
            padding: 40px 32px;
            border: 1px solid #2a3a5a;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }
        .forgot-wrapper .brand {
            text-align: center;
            margin-bottom: 28px;
        }
        .forgot-wrapper .brand .logo {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: 800;
            color: #fff;
            margin: 0 auto 12px;
        }
        .forgot-wrapper .brand h1 {
            font-size: 22px;
            font-weight: 700;
        }
        .forgot-wrapper .brand p {
            color: #8899bb;
            font-size: 14px;
            margin-top: 4px;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #8899bb;
            margin-bottom: 6px;
        }
        .form-group .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: #0f1729;
            border: 1px solid #2a3a5a;
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        .form-group .input-wrapper:focus-within {
            border-color: #22c55e;
            box-shadow: 0 0 0 3px rgba(34,197,94,0.1);
        }
        .form-group .input-wrapper i {
            position: absolute;
            left: 14px;
            color: #5a6a8a;
            font-size: 18px;
        }
        .form-group .input-wrapper input {
            width: 100%;
            padding: 14px 14px 14px 46px;
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 15px;
            outline: none;
            font-family: 'Inter', sans-serif;
        }
        .form-group .input-wrapper input::placeholder {
            color: #5a6a8a;
        }
        .btn-reset {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }
        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(34,197,94,0.3);
        }
        .btn-reset:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }
        .btn-reset .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .success-msg {
            background: rgba(34,197,94,0.1);
            border: 1px solid rgba(34,197,94,0.2);
            border-radius: 10px;
            padding: 10px 14px;
            color: #22c55e;
            font-size: 14px;
            display: none;
            margin-bottom: 16px;
        }
        .success-msg.show { display: block; }
        .error-msg {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 10px;
            padding: 10px 14px;
            color: #ef4444;
            font-size: 14px;
            display: none;
            margin-bottom: 16px;
        }
        .error-msg.show { display: block; }
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #8899bb;
            font-size: 14px;
        }
        .login-link a {
            color: #22c55e;
            text-decoration: none;
            font-weight: 600;
        }
        .login-link a:hover { text-decoration: underline; }
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            max-width: 400px;
            width: 100%;
        }
        .toast-custom {
            background: #1a2236;
            border: 1px solid #2a3a5a;
            border-radius: 12px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            animation: slideIn 0.4s ease;
            margin-bottom: 10px;
            color: #fff;
            font-size: 14px;
            border-left: 4px solid #22c55e;
        }
        .toast-custom.error { border-left-color: #ef4444; }
        .toast-custom i { font-size: 20px; }
        .toast-custom .toast-msg { flex: 1; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @media (max-width: 480px) {
            .forgot-wrapper { padding: 28px 20px; }
        }
    </style>
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>

    <div class="forgot-wrapper">
        <!-- Brand -->
        <div class="brand">
            <div class="logo">R</div>
            <h1>Reset Password</h1>
            <p>Enter your email to receive reset instructions</p>
        </div>

        <!-- Error Message -->
        <div class="error-msg" id="errorMsg"></div>

        <!-- Success Message -->
        <div class="success-msg" id="successMsg"></div>

        <!-- Reset Form -->
        <form id="resetForm">
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i class="bi bi-envelope"></i>
                    <input type="email" id="resetEmail" placeholder="Enter your email" required autocomplete="email">
                </div>
            </div>

            <button type="submit" class="btn-reset" id="resetBtn">
                <i class="bi bi-envelope-paper me-2"></i> Send Reset Link
            </button>
        </form>

        <div class="login-link">
            <a href="login.html">← Back to Login</a>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "./": "./"
        }
    }
    </script>

    <script type="module">
        import { resetPassword, onAuthChange } from './auth.js';
        import { showToast } from './toast.js';

        const form = document.getElementById('resetForm');
        const emailInput = document.getElementById('resetEmail');
        const resetBtn = document.getElementById('resetBtn');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.className = 'error-msg show';
            successMsg.className = 'success-msg';
            setTimeout(() => {
                errorMsg.className = 'error-msg';
            }, 5000);
        }

        function showSuccess(message) {
            successMsg.textContent = message;
            successMsg.className = 'success-msg show';
            errorMsg.className = 'error-msg';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = emailInput.value.trim();

            if (!email) {
                showError('Please enter your email address');
                return;
            }

            resetBtn.disabled = true;
            resetBtn.innerHTML = '<span class="spinner"></span> Sending...';

            try {
                const result = await resetPassword(email);
                if (result.success) {
                    showSuccess('✅ Password reset link sent! Check your email.');
                    showToast('✅ Reset link sent to your email', 'success');
                    emailInput.value = '';
                } else {
                    showError(result.error || 'Failed to send reset link. Please try again.');
                    showToast('❌ ' + (result.error || 'Failed to send reset link'), 'error');
                }
            } catch (error) {
                console.error('Reset error:', error);
                showError('An unexpected error occurred. Please try again.');
                showToast('❌ An unexpected error occurred', 'error');
            }

            resetBtn.disabled = false;
            resetBtn.innerHTML = '<i class="bi bi-envelope-paper me-2"></i> Send Reset Link';
        });

        onAuthChange((user) => {
            if (user) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>

</body>
</html>
