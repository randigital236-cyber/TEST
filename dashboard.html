<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Dashboard - RND Staking</title>
    
    <!-- ============================================================
    EXTERNAL CSS
    ============================================================ -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <style>
        /* ============================================================
           RND STAKING - DASHBOARD PAGE STYLES
           ============================================================ */

        /* ============================================================
           GLOBAL RESET & BASE
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #080e1a 0%, #0f1f3a 50%, #1a2a4a 100%);
            min-height: 100vh;
            padding: 0;
            color: #f0f4ff;
        }

        /* ============================================================
           SIDEBAR
           ============================================================ */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1040;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .sidebar-overlay.active {
            display: block;
            opacity: 1;
        }

        .sidebar-panel {
            position: fixed;
            top: 0;
            left: -300px;
            width: 280px;
            height: 100%;
            background: rgba(19, 34, 55, 0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid rgba(46, 204, 113, 0.1);
            z-index: 1050;
            transition: left 0.3s ease;
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar-panel.open {
            left: 0;
        }

        .sidebar-panel .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 20px;
        }

        .sidebar-panel .sidebar-header .logo-text {
            font-size: 1.3rem;
            font-weight: 800;
            color: #fff;
        }

        .sidebar-panel .sidebar-header .logo-text span {
            color: #2ecc71;
        }

        .sidebar-panel .sidebar-close {
            background: none;
            border: none;
            color: #8899bb;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
        }

        .sidebar-panel .sidebar-close:hover {
            color: #fff;
        }

        .sidebar-panel .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            background: rgba(46, 204, 113, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(46, 204, 113, 0.1);
            margin-bottom: 20px;
        }

        .sidebar-panel .user-profile .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            color: #fff;
            flex-shrink: 0;
        }

        .sidebar-panel .user-profile .info {
            flex: 1;
            min-width: 0;
        }

        .sidebar-panel .user-profile .info .name {
            font-weight: 600;
            font-size: 0.95rem;
            color: #f0f4ff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-panel .user-profile .info .uid {
            font-size: 0.7rem;
            color: #8899bb;
            font-family: monospace;
        }

        .sidebar-panel .nav-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .sidebar-panel .nav-menu li {
            margin-bottom: 4px;
        }

        .sidebar-panel .nav-menu li a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            color: #a0b8d0;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .sidebar-panel .nav-menu li a:hover {
            background: rgba(46, 204, 113, 0.05);
            color: #2ecc71;
        }

        .sidebar-panel .nav-menu li a.active {
            background: rgba(46, 204, 113, 0.1);
            color: #2ecc71;
        }

        .sidebar-panel .nav-menu li a i {
            font-size: 1.1rem;
            width: 24px;
            text-align: center;
        }

        .sidebar-panel .nav-menu li a .badge {
            background: #2ecc71;
            color: #fff;
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: auto;
        }

        .sidebar-panel .nav-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.05);
            margin: 15px 0;
        }

        .sidebar-panel .sidebar-footer {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sidebar-panel .sidebar-footer .logout-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            color: #ef4444;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            cursor: pointer;
            background: none;
            border: none;
            width: 100%;
        }

        .sidebar-panel .sidebar-footer .logout-btn:hover {
            background: rgba(239, 68, 68, 0.05);
        }

        /* ============================================================
           MAIN CONTENT
           ============================================================ */
        .main-content {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            padding-top: 80px;
        }

        /* ============================================================
           TOP BAR
           ============================================================ */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1030;
            background: rgba(8, 14, 26, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(46, 204, 113, 0.05);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .top-bar .menu-toggle {
            background: none;
            border: none;
            color: #f0f4ff;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 4px 8px;
        }

        .top-bar .menu-toggle:hover {
            color: #2ecc71;
        }

        .top-bar .logo-text {
            font-size: 1.2rem;
            font-weight: 800;
            color: #fff;
        }

        .top-bar .logo-text span {
            color: #2ecc71;
        }

        .top-bar .top-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .top-bar .top-actions .notification-btn {
            background: none;
            border: none;
            color: #a0b8d0;
            font-size: 1.2rem;
            cursor: pointer;
            position: relative;
            padding: 4px;
        }

        .top-bar .top-actions .notification-btn:hover {
            color: #2ecc71;
        }

        .top-bar .top-actions .notification-btn .dot {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
        }

        .top-bar .top-actions .user-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 4px 12px 4px 4px;
            border-radius: 50px;
            background: rgba(46, 204, 113, 0.05);
            border: 1px solid rgba(46, 204, 113, 0.1);
            transition: all 0.3s ease;
        }

        .top-bar .top-actions .user-badge:hover {
            border-color: rgba(46, 204, 113, 0.3);
        }

        .top-bar .top-actions .user-badge .avatar-sm {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
            color: #fff;
        }

        .top-bar .top-actions .user-badge .name-sm {
            font-size: 0.8rem;
            color: #f0f4ff;
            font-weight: 500;
            display: none;
        }

        /* ============================================================
           CARDS
           ============================================================ */
        .card-glass {
            background: rgba(19, 34, 55, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(46, 204, 113, 0.1);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .card-glass:hover {
            border-color: rgba(46, 204, 113, 0.2);
        }

        .card-title {
            font-weight: 600;
            font-size: 0.95rem;
            color: #a0b8d0;
            margin-bottom: 15px;
        }

        /* ============================================================
           WALLET CARDS
           ============================================================ */
        .wallet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .wallet-card {
            background: rgba(19, 34, 55, 0.8);
            border: 1px solid rgba(46, 204, 113, 0.1);
            border-radius: 16px;
            padding: 18px 16px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .wallet-card:hover {
            border-color: rgba(46, 204, 113, 0.3);
            transform: translateY(-2px);
        }

        .wallet-card .wallet-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-size: 1.3rem;
        }

        .wallet-card .wallet-icon.deposit {
            background: rgba(46, 204, 113, 0.1);
            color: #2ecc71;
        }

        .wallet-card .wallet-icon.referral {
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
        }

        .wallet-card .wallet-icon.rnd {
            background: rgba(96, 165, 250, 0.1);
            color: #60a5fa;
        }

        .wallet-card .wallet-icon.locked {
            background: rgba(167, 139, 250, 0.1);
            color: #a78bfa;
        }

        .wallet-card .wallet-number {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .wallet-card .wallet-number.green {
            color: #2ecc71;
        }

        .wallet-card .wallet-number.gold {
            color: #fbbf24;
        }

        .wallet-card .wallet-number.blue {
            color: #60a5fa;
        }

        .wallet-card .wallet-number.purple {
            color: #a78bfa;
        }

        .wallet-card .wallet-label {
            font-size: 0.75rem;
            color: #8899bb;
        }

        .wallet-card .wallet-sub {
            font-size: 0.65rem;
            color: #556688;
            margin-top: 2px;
        }

        /* ============================================================
           STATS GRID
           ============================================================ */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(19, 34, 55, 0.6);
            border: 1px solid rgba(46, 204, 113, 0.05);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }

        .stat-card .number {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2ecc71;
        }

        .stat-card .label {
            font-size: 0.7rem;
            color: #8899bb;
            margin-top: 2px;
        }

        /* ============================================================
           LEVEL STATS
           ============================================================ */
        .level-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .level-stat-card {
            background: rgba(19, 34, 55, 0.6);
            border: 1px solid rgba(46, 204, 113, 0.05);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }

        .level-stat-card .number {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fbbf24;
        }

        .level-stat-card .label {
            font-size: 0.65rem;
            color: #8899bb;
        }

        /* ============================================================
           COMMISSION ROWS
           ============================================================ */
        .commission-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .commission-row:last-child {
            border-bottom: none;
        }

        .commission-row .level {
            color: #a0b8d0;
            font-size: 0.85rem;
        }

        .commission-row .earnings {
            font-weight: 600;
            font-size: 0.9rem;
            color: #fbbf24;
        }

        /* ============================================================
           REFERRAL BOX
           ============================================================ */
        .referral-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(8, 14, 26, 0.6);
            border: 1px solid rgba(46, 204, 113, 0.1);
            border-radius: 12px;
            padding: 10px 14px;
            flex-wrap: wrap;
        }

        .referral-box code {
            flex: 1;
            font-size: 0.75rem;
            color: #60a5fa;
            word-break: break-all;
            background: none;
            padding: 0;
            min-width: 150px;
        }

        .referral-box .copy-btn {
            background: rgba(46, 204, 113, 0.1);
            border: none;
            color: #2ecc71;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .referral-box .copy-btn:hover {
            background: rgba(46, 204, 113, 0.2);
        }

        /* ============================================================
           TRANSFER HISTORY
           ============================================================ */
        .transfer-history {
            max-height: 200px;
            overflow-y: auto;
        }

        .transfer-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 0.8rem;
        }

        .transfer-item:last-child {
            border-bottom: none;
        }

        .transfer-item .sent {
            color: #ef4444;
        }

        .transfer-item .received {
            color: #2ecc71;
        }

        .transfer-item .amount {
            font-weight: 600;
        }

        .transfer-item .amount.sent {
            color: #ef4444;
        }

        .transfer-item .amount.received {
            color: #2ecc71;
        }

        .transfer-item .date {
            font-size: 0.6rem;
            color: #556688;
        }

        .transfer-item .user {
            color: #a0b8d0;
        }

        /* ============================================================
           QUICK LINKS
           ============================================================ */
        .quick-links {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .quick-links .btn-link-custom {
            padding: 8px 16px;
            border-radius: 10px;
            background: rgba(46, 204, 113, 0.05);
            border: 1px solid rgba(46, 204, 113, 0.1);
            color: #a0b8d0;
            text-decoration: none;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .quick-links .btn-link-custom:hover {
            background: rgba(46, 204, 113, 0.1);
            border-color: rgba(46, 204, 113, 0.3);
            color: #2ecc71;
        }

        /* ============================================================
           BUTTONS
           ============================================================ */
        .btn-primary-custom {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-primary-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(46, 204, 113, 0.3);
            color: #fff;
        }

        .btn-outline-custom {
            background: transparent;
            border: 1px solid rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-outline-custom:hover {
            background: rgba(46, 204, 113, 0.05);
            border-color: #2ecc71;
            color: #2ecc71;
        }

        /* ============================================================
           WELCOME SECTION
           ============================================================ */
        .welcome-section h2 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .welcome-section h2 span {
            color: #2ecc71;
        }

        .welcome-section .badge-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .welcome-section .badge-group .badge-custom {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
            background: rgba(46, 204, 113, 0.05);
            border: 1px solid rgba(46, 204, 113, 0.1);
            color: #a0b8d0;
        }

        .welcome-section .badge-group .badge-custom.active {
            border-color: rgba(46, 204, 113, 0.3);
            color: #2ecc71;
        }

        /* ============================================================
           RELEASE INFO BOX
           ============================================================ */
        .release-info-box {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 12px 16px;
            background: rgba(46, 204, 113, 0.03);
            border: 1px solid rgba(46, 204, 113, 0.05);
            border-radius: 12px;
            font-size: 0.8rem;
        }

        .release-info-box .label {
            color: #8899bb;
        }

        .release-info-box .value {
            color: #fbbf24;
            font-weight: 600;
        }

        /* ============================================================
           TOAST CONTAINER
           ============================================================ */
        .toast-container {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 9999;
            max-width: 400px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast-custom {
            background: rgba(19, 34, 55, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(46, 204, 113, 0.2);
            border-radius: 16px;
            padding: 16px 20px;
            color: #f0f4ff;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.4s ease;
            pointer-events: auto;
            transition: all 0.3s ease;
        }

        .toast-custom.success {
            border-left: 4px solid #2ecc71;
        }

        .toast-custom.error {
            border-left: 4px solid #ef4444;
        }

        .toast-custom.warning {
            border-left: 4px solid #f59e0b;
        }

        .toast-custom.info {
            border-left: 4px solid #60a5fa;
        }

        .toast-custom i {
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .toast-custom .toast-msg {
            flex: 1;
            font-size: 0.9rem;
        }

        /* ============================================================
           ANIMATIONS
           ============================================================ */
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 768px) {
            .top-bar .top-actions .user-badge .name-sm {
                display: none;
            }
            
            .wallet-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .level-stats {
                grid-template-columns: repeat(3, 1fr);
            }
            
            .main-content {
                padding: 15px;
                padding-top: 75px;
            }
            
            .sidebar-panel {
                width: 260px;
            }
        }

        @media (max-width: 480px) {
            .wallet-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            
            .wallet-card {
                padding: 14px 12px;
            }
            
            .wallet-card .wallet-number {
                font-size: 1.1rem;
            }
            
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
            
            .level-stats {
                grid-template-columns: repeat(3, 1fr);
            }
            
            .card-glass {
                padding: 15px;
            }
            
            .referral-box {
                flex-direction: column;
                align-items: stretch;
            }
            
            .referral-box code {
                font-size: 0.7rem;
            }
        }

        /* ============================================================
           SCROLLBAR STYLING
           ============================================================ */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(46, 204, 113, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(46, 204, 113, 0.5);
        }
    </style>
</head>
<body>

<!-- ============================================================
TOAST CONTAINER
============================================================ -->
<div class="toast-container" id="toastContainer"></div>

<!-- ============================================================
SIDEBAR OVERLAY
============================================================ -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- ============================================================
SIDEBAR PANEL
============================================================ -->
<div class="sidebar-panel" id="sidebarPanel">
    <div class="sidebar-header">
        <div class="logo-text"><i class="bi bi-currency-bitcoin me-1"></i>RND<span>Staking</span></div>
        <button class="sidebar-close" id="sidebarClose"><i class="bi bi-x-lg"></i></button>
    </div>
    
    <div class="user-profile">
