<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Dashboard - RND Staking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

    <!-- ====== TOAST CONTAINER ====== -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ====== NAVBAR ====== -->
    <nav class="navbar navbar-custom">
        <div class="container-fluid px-3 px-md-4">
            <a class="navbar-brand" href="dashboard.html">
                <i class="bi bi-currency-bitcoin me-2"></i>RND Staking
            </a>
            <div class="d-flex align-items-center gap-2">
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="bi bi-list"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- ====== SIDEBAR ====== -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar-panel" id="sidebarPanel">
        <div class="sidebar-header">
            <h5><i class="bi bi-grid-1x2-fill me-2"></i>Menu</h5>
            <button class="sidebar-close" id="sidebarClose"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="user-profile-sidebar">
            <div class="d-flex align-items-center gap-3">
                <div class="avatar" id="sidebarAvatar">U</div>
                <div>
                    <div class="user-name" id="sidebarName">User</div>
                    <div class="user-id" id="sidebarUserId">ID: ---</div>
                </div>
            </div>
        </div>
        <a href="dashboard.html" class="nav-item active">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>
        <a href="deposit.html" class="nav-item">
            <i class="bi bi-arrow-down-circle"></i> Deposit
        </a>
        <a href="withdraw.html" class="nav-item">
            <i class="bi bi-arrow-up-circle"></i> Withdraw
        </a>
        <a href="referral.html" class="nav-item">
            <i class="bi bi-people"></i> Referrals
            <span class="badge" id="referralBadge">0</span>
        </a>
        <a href="packages.html" class="nav-item">
            <i class="bi bi-box-seam"></i> Packages
        </a>
        <a href="transactions.html" class="nav-item">
            <i class="bi bi-receipt"></i> Transactions
        </a>
        <a href="rank.html" class="nav-item">
            <i class="bi bi-trophy"></i> Rank
        </a>
        <a href="profile.html" class="nav-item">
            <i class="bi bi-person"></i> Profile
        </a>
        <a href="support.html" class="nav-item">
            <i class="bi bi-headset"></i> Support
        </a>
        <div class="sidebar-footer">
            <a href="#" class="nav-item" id="logoutBtnSidebar">
                <i class="bi bi-box-arrow-right"></i> Logout
            </a>
        </div>
    </div>

    <!-- ====== DASHBOARD CONTENT ====== -->
    <div class="dashboard-container" id="dashboardContent">
        <div class="text-center py-5">
            <div class="spinner-border text-success" role="status" style="width: 3rem; height: 3rem;"></div>
            <p class="text-muted mt-3">Loading dashboard...</p>
        </div>
    </div>

    <!-- ====== SCRIPTS ====== -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
        }
    }
    </script>
    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
