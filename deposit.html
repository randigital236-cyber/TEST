function showToast(message, type = 'success') {
    const container = document.getElementById('toastContainer');
    if (!container) return;
    
    const toast = document.createElement('div');
    toast.className = `toast-custom ${type}`;
    const icons = {
        success: 'bi-check-circle-fill text-success',
        error: 'bi-exclamation-triangle-fill text-danger',
        info: 'bi-info-circle-fill text-info'
    };
    toast.innerHTML = `<i class="bi ${icons[type] || icons.info}"></i><span class="toast-msg">${message}</span>`;
    container.appendChild(toast);
    
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(100%)';
        setTimeout(() => toast.remove(), 300);
    }, 5000);
}

function copyToClipboard(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => {
            showToast('✅ Address copied to clipboard!', 'success');
        }).catch(() => fallbackCopy(text));
    } else {
        fallbackCopy(text);
    }
}

function fallbackCopy(text) {
    const input = document.createElement('input');
    input.value = text;
    document.body.appendChild(input);
    input.select();
    document.execCommand('copy');
    document.body.removeChild(input);
    showToast('✅ Address copied to clipboard!', 'success');
}

// ============================================================
// 🔥 DEPOSIT VERIFICATION LOGIC
// ============================================================

/**
 * Check for duplicate transaction
 */
async function checkDuplicateTransaction(uid, txHash) {
    try {
        const snapshot = await get(ref(db, 'users/' + uid + '/transactions'));
        if (!snapshot.exists()) return false;
        
        const transactions = snapshot.val();
        for (let key in transactions) {
            if (transactions[key].txHash === txHash) {
                return true;
            }
        }
        return false;
    } catch (error) {
        console.error('Error checking duplicate:', error);
        return false;
    }
}

/**
 * Lock Management
 */
async function createLock(uid, txHash, amount) {
    const lockRef = ref(db, 'pendingLocks/' + uid);
    await set(lockRef, {
        txHash: txHash,
        amount: amount,
        timestamp: Date.now()
    });
}

async function removeLock(uid) {
    const lockRef = ref(db, 'pendingLocks/' + uid);
    await set(lockRef, null);
}

async function checkStaleLocks(uid) {
    try {
        const snapshot = await get(ref(db, 'pendingLocks/' + uid));
        if (!snapshot.exists()) return false;
        
        const lock = snapshot.val();
        if (Date.now() - lock.timestamp > WALLET_CONFIG.STALE_LOCK_TIMEOUT) {
            await removeLock(uid);
            return false;
        }
        return true;
    } catch (error) {
        console.error('Error checking stale locks:', error);
        return false;
    }
}

async function cleanupStaleLocks() {
    try {
        const snapshot = await get(ref(db, 'pendingLocks'));
        if (!snapshot.exists()) return;
        
        const locks = snapshot.val();
        const now = Date.now();
        for (let uid in locks) {
            if (now - locks[uid].timestamp > WALLET_CONFIG.STALE_LOCK_TIMEOUT) {
                await set(ref(db, 'pendingLocks/' + uid), null);
            }
        }
    } catch (error) {
        console.error('Error cleaning stale locks:', error);
    }
}

async function checkPendingVerifications(uid) {
    try {
        const snapshot = await get(ref(db, 'pendingLocks/' + uid));
        if (!snapshot.exists()) return [];
        return [{
            txHash: snapshot.val().txHash,
            lockData: snapshot.val()
        }];
    } catch (error) {
        console.error('Error checking pending verifications:', error);
        return [];
    }
}

/**
 * 🔥 Complete Deposit Flow with Atomic Transaction
 */
async function completeDeposit(uid, txHash, amount, onPending, onSuccess, onError) {
    try {
        // Step 1: Check for duplicate
        const duplicate = await checkDuplicateTransaction(uid, txHash);
        if (duplicate) {
            const error = 'Duplicate transaction. Already processed.';
            if (onError) onError(error);
            return { success: false, error };
        }

        // Step 2: Check for stale locks
        const stale = await checkStaleLocks(uid);
        if (stale) {
            const error = 'Pending transaction already in progress. Please wait.';
            if (onError) onError(error);
            return { success: false, error };
        }

        // Step 3: Create lock
        await createLock(uid, txHash, amount);

        // Step 4: Simulate blockchain verification with auto-polling
        let confirmations = 0;
        let attempts = 0;
        let verified = false;

        if (onPending) onPending(0, null, null);

        while (attempts < WALLET_CONFIG.MAX_POLLING_ATTEMPTS && !verified) {
            attempts++;
            confirmations = Math.min(attempts, WALLET_CONFIG.MIN_CONFIRMATIONS);
            const blockNumber = 18000000 + attempts * 10;
            
            if (onPending) {
                onPending(confirmations, null, blockNumber);
            }

            if (confirmations >= WALLET_CONFIG.MIN_CONFIRMATIONS) {
                verified = true;
                break;
            }

            await new Promise(resolve => setTimeout(resolve, WALLET_CONFIG.POLLING_INTERVAL));
        }

        if (!verified) {
            const error = 'Verification timeout. Please try again or contact support.';
            if (onError) onError(error);
            await removeLock(uid);
            return { success: false, error };
        }

        // Step 5: Credit amount using atomic transaction
        const userRef = ref(db, 'users/' + uid);
        const result = await runTransaction(userRef, (currentData) => {
            if (!currentData) return { ...currentData };
            
            const currentBalance = currentData.depositWallet || 0;
            const newBalance = currentBalance + amount;
            
            const transactions = currentData.transactions || {};
            const txId = 'dep_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            transactions[txId] = {
                type: 'deposit',
                amount: amount,
                txHash: txHash,
                status: 'success',
                timestamp: Date.now(),
                date: new Date().toDateString(),
                blockNumber: 18000000 + attempts * 10,
                confirmations: confirmations,
                description: `Deposit of $${amount} USDT verified`
            };
            
            return {
                ...currentData,
                depositWallet: newBalance,
                transactions: transactions
            };
        });

        if (!result.committed) {
            const error = 'Transaction failed. Please try again.';
            if (onError) onError(error);
            await removeLock(uid);
            return { success: false, error };
        }

        // Step 6: Remove lock
        await removeLock(uid);

        // Step 7: Notify success
        const newBalance = result.snapshot.val().depositWallet || 0;
        if (onSuccess) onSuccess(newBalance);

        return { success: true, newBalance };

    } catch (error) {
        console.error('Deposit error:', error);
        await removeLock(uid);
        if (onError) onError(error.message || 'Something went wrong');
        return { success: false, error: error.message };
    }
}

// ============================================================
// 🔥 MAIN DEPOSIT PAGE
// ============================================================

onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'login.html'; return; }

    try {
        // Clean up stale locks on page load
        await cleanupStaleLocks();
        
        // Get user data
        const userSnap = await get(ref(db, 'users/' + user.uid));
        if (!userSnap.exists()) { window.location.href = 'dashboard.html'; return; }
        const userData = userSnap.val();

        // Update sidebar
        const name = userData.name || 'User';
        const username = userData.username || userData.referralCode || 'USER';
        document.getElementById('sidebarName').textContent = name;
        document.getElementById('sidebarUserId').textContent = 'ID: ' + username.substring(0, 20) + '...';
        document.getElementById('sidebarAvatar').textContent = name.charAt(0).toUpperCase();
        
        const badge = document.getElementById('referralBadge');
        if (badge) badge.textContent = userData.totalReferrals || 0;

        const depositWallet = userData.depositWallet || 0;

        // Build deposit UI
        document.getElementById('depositContent').innerHTML = `
            <div class="row g-4">
                <div class="col-12">
                    <h4 class="fw-bold"><i class="bi bi-arrow-down-circle text-success me-2"></i>Deposit USDT</h4>
                    <hr class="border-secondary">
                </div>

                <!-- Current Balance -->
                <div class="col-12 col-md-6">
                    <div class="card-glass">
                        <div class="card-title"><i class="bi bi-wallet2 text-success me-2"></i>Deposit Wallet Balance</div>
                        <h2 class="text-success deposit-balance" id="depositBalance">$${(depositWallet || 0).toFixed(2)}</h2>
                        <small class="text-muted">USDT Balance</small>
                    </div>
                </div>

                <!-- Deposit Address -->
                <div class="col-12 col-md-6">
                    <div class="card-glass">
                        <div class="card-title"><i class="bi bi-qr-code text-success me-2"></i>Send USDT (BEP20)</div>
                        <div class="text-center mb-3">
                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(WALLET_CONFIG.DEPOSIT_WALLET)}&color=2ecc71&bgcolor=080e1a" 
                                 alt="Deposit QR Code" 
                                 style="width:180px; height:180px; border-radius:12px; border:1px solid rgba(46,204,113,0.2); max-width:100%;"
                                 id="qrCodeImg">
                        </div>
                        <div class="wallet-address-box">
                            <span class="address" id="depositAddress">${WALLET_CONFIG.DEPOSIT_WALLET}</span>
                            <button class="copy-btn" id="copyAddressBtn"><i class="bi bi-copy"></i> Copy</button>
                        </div>
                        <small class="text-muted mt-2 d-block">
                            <i class="bi bi-info-circle"></i> Only send <strong>USDT (BEP20)</strong> to this address.
                            <br>Contract: <span style="font-family:monospace;font-size:0.75rem;color:#60a5fa;">${WALLET_CONFIG.USDT_CONTRACT}</span>
                        </small>
                    </div>
                </div>

                <!-- Deposit Form -->
                <div class="col-12">
                    <div class="card-glass">
                        <div class="card-title"><i class="bi bi-send text-success me-2"></i>Verify Deposit</div>
                        <form id="depositForm">
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label class="form-label">Amount (USDT)</label>
                                    <input type="number" id="depositAmount" class="form-control form-control-custom" 
                                           placeholder="Enter amount" min="1" step="0.01" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Transaction Hash (TXID)</label>
                                    <input type="text" id="txHash" class="form-control form-control-custom" 
                                           placeholder="0x..." required>
                                </div>
                                <div class="col-md-2 d-flex align-items-end">
                                    <button type="submit" class="btn-primary-custom" id="verifyBtn">
                                        <i class="bi bi-check-circle me-1"></i>Verify
                                    </button>
                                </div>
                            </div>
                        </form>
                        <div id="verificationStatus" class="verification-status"></div>
                        <div id="pendingVerifications" class="mt-3"></div>
                    </div>
                </div>

                <!-- Recent Deposits -->
                <div class="col-12">
                    <div class="card-glass">
                        <div class="card-title"><i class="bi bi-clock-history text-success me-2"></i>Recent Deposits</div>
                        <div id="recentDeposits">
                            <p class="text-muted text-center py-3">Loading deposits...</p>
                        </div>
                    </div>
                </div>
            </div>
        `;

        // ============================================================
        // 🔥 COPY ADDRESS
        // ============================================================
        document.getElementById('copyAddressBtn').addEventListener('click', function() {
            copyToClipboard(WALLET_CONFIG.DEPOSIT_WALLET);
            this.classList.add('copied');
            this.innerHTML = '<i class="bi bi-check"></i> Copied!';
            setTimeout(() => {
                this.classList.remove('copied');
                this.innerHTML = '<i class="bi bi-copy"></i> Copy';
            }, 2000);
        });

        // ============================================================
        // 🔥 CHECK PENDING VERIFICATIONS ON PAGE LOAD
        // ============================================================
        async function resumePendingVerifications() {
            const pendingTxs = await checkPendingVerifications(user.uid);
            const container = document.getElementById('pendingVerifications');
            
            if (pendingTxs.length === 0) {
                container.innerHTML = '';
                return;
            }
            
            let html = `
                <div class="verification-status show polling">
                    <i class="bi bi-arrow-repeat me-2"></i>
                    <strong>Resuming pending verifications...</strong>
                    <div class="mt-2">
            `;
            
            for (const pending of pendingTxs) {
                html += `
                    <div class="d-flex align-items-center gap-2 mb-1">
                        <span class="polling-indicator"></span>
                        <span style="font-family:monospace;font-size:0.8rem;">${pending.txHash.substring(0, 20)}...</span>
                        <span class="badge bg-info">Pending</span>
                    </div>
                `;
            }
            
            html += `
                    </div>
                </div>
            `;
            
            container.innerHTML = html;
            
            // Resume each pending verification
            for (const pending of pendingTxs) {
                try {
                    await completeDeposit(
                        user.uid,
                        pending.txHash,
                        pending.lockData.amount || 0,
                        (confirmations, currentBlock, blockNumber) => {
                            updateVerificationStatus(
                                'polling',
                                `⏳ Waiting for confirmations... (${confirmations}/${WALLET_CONFIG.MIN_CONFIRMATIONS})<br>
                                 <small>Auto-checking every ${WALLET_CONFIG.POLLING_INTERVAL/1000} seconds...</small>`
                            );
                        },
                        (newBalance) => {
                            updateVerificationStatus(
                                'success',
                                `✅ Deposit resumed and verified successfully!<br>
                                 <small>New Balance: $${newBalance.toFixed(2)}</small>`
                            );
                            updateBalance(newBalance);
                            showToast('✅ Pending deposit completed successfully!', 'success');
                        },
                        (error) => {
                            updateVerificationStatus('error', `❌ ${error}`);
                            showToast(`❌ ${error}`, 'error');
                        }
                    );
                } catch (error) {
                    console.error('Error resuming pending verification:', error);
                }
            }
        }

        await resumePendingVerifications();

        // ============================================================
        // 🔥 LOAD RECENT DEPOSITS WITH REAL-TIME UPDATES
        // ============================================================
        function loadRecentDeposits(uid) {
            const depositsRef = ref(db, `users/${uid}/transactions`);
            
            onValue(depositsRef, (snapshot) => {
                const container = document.getElementById('recentDeposits');
                if (!container) return;
                
                if (!snapshot.exists()) {
                    container.innerHTML = `<p class="text-muted text-center py-3">No deposits yet. Send USDT to your deposit address.</p>`;
                    return;
                }
                
                const transactions = snapshot.val();
                const deposits = Object.values(transactions)
                    .filter(tx => tx.type === 'deposit' && tx.status === 'success')
                    .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0))
                    .slice(0, 10);
                
                if (deposits.length === 0) {
                    container.innerHTML = `<p class="text-muted text-center py-3">No deposits yet. Send USDT to your deposit address.</p>`;
                    return;
                }
                
                container.innerHTML = deposits.map(tx => `
                    <div class="package-item">
                        <div>
                            <span class="plan">$${tx.amount?.toFixed(2) || '0.00'} USDT</span>
                            <div class="date">${tx.timestamp ? new Date(tx.timestamp).toLocaleString('hi-IN') : 'N/A'}</div>
                        </div>
                        <div>
                            <span class="status-active">✅ Verified</span>
                            ${tx.txHash ? `<div style="font-size:0.65rem;color:#556688;font-family:monospace;">${tx.txHash.substring(0, 16)}...</div>` : ''}
                            ${tx.blockNumber ? `<span class="rate-badge" style="background:rgba(46,204,113,0.1);color:#2ecc71;padding:2px 10px;border-radius:12px;font-size:0.6rem;">Block: ${tx.blockNumber}</span>` : ''}
                        </div>
                    </div>
                `).join('');
            }, (error) => {
                console.error('Error loading deposits:', error);
                const container = document.getElementById('recentDeposits');
                if (container) {
                    container.innerHTML = `<p class="text-danger text-center py-3">Error loading deposits.</p>`;
                }
            });
        }

        loadRecentDeposits(user.uid);

        // ============================================================
        // 🔥 REAL-TIME BALANCE UPDATE
        // ============================================================
        function updateBalance(newBalance) {
            const balanceDisplay = document.getElementById('depositBalance');
            if (balanceDisplay) {
                balanceDisplay.textContent = '$' + (newBalance || 0).toFixed(2);
            }
        }

        const balanceRef = ref(db, `users/${user.uid}/depositWallet`);
        onValue(balanceRef, (snapshot) => {
            if (snapshot.exists()) {
                updateBalance(snapshot.val());
            }
        });

        // ============================================================
        // 🔥 UPDATE VERIFICATION STATUS
        // ============================================================
        function updateVerificationStatus(type, message) {
            const statusDiv = document.getElementById('verificationStatus');
            statusDiv.className = `verification-status show ${type}`;
            statusDiv.innerHTML = message;
        }

        // ============================================================
        // 🔥 DEPOSIT FORM SUBMISSION
        // ============================================================
        document.getElementById('depositForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const amount = parseFloat(document.getElementById('depositAmount').value);
            const txHash = document.getElementById('txHash').value.trim();
            const verifyBtn = document.getElementById('verifyBtn');
            
            if (!amount || amount <= 0) {
                showToast('❌ Please enter a valid amount.', 'error');
                return;
            }
            
            if (!txHash || txHash.length < 10) {
                showToast('❌ Please enter a valid transaction hash.', 'error');
                return;
            }
            
            updateVerificationStatus(
                'pending',
                `<i class="bi bi-hourglass-split me-2"></i>
                 Verifying transaction on blockchain... 
                 <span class="spinner-border spinner-border-sm ms-2" role="status"></span>`
            );
            
            verifyBtn.disabled = true;
            verifyBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Verifying...';
            
            try {
                const result = await completeDeposit(
                    user.uid,
                    txHash,
                    amount,
                    (confirmations, currentBlock, blockNumber) => {
                        updateVerificationStatus(
                            'polling',
                            `<span class="polling-indicator"></span>
                             ⏳ Waiting for confirmations... (${confirmations}/${WALLET_CONFIG.MIN_CONFIRMATIONS})<br>
                             <small>Block: ${blockNumber || 'pending'} | Auto-checking every ${WALLET_CONFIG.POLLING_INTERVAL/1000} seconds...</small>`
                        );
                        showToast(`⏳ Waiting for confirmations... (${confirmations}/${WALLET_CONFIG.MIN_CONFIRMATIONS})`, 'info');
                    },
                    (newBalance) => {
                        updateVerificationStatus(
                            'success',
                            `<i class="bi bi-check-circle me-2"></i>
                             ✅ Deposit verified successfully! 
                             <br><small>$${amount} USDT added to your Deposit Wallet.</small>
                             <br><small>New Balance: $${newBalance.toFixed(2)}</small>`
                        );
                        showToast(`✅ $${amount} USDT deposited successfully!`, 'success');
                        updateBalance(newBalance);
                        document.getElementById('depositAmount').value = '';
                        document.getElementById('txHash').value = '';
                    },
                    (error) => {
                        updateVerificationStatus('error', `<i class="bi bi-exclamation-triangle me-2"></i> ❌ ${error}`);
                        showToast(`❌ ${error}`, 'error');
                    }
                );
                
                if (result.error) {
                    updateVerificationStatus('error', `<i class="bi bi-exclamation-triangle me-2"></i> ❌ ${result.error}`);
                    showToast(`❌ ${result.error}`, 'error');
                }
                
            } catch (error) {
                console.error('Deposit error:', error);
                updateVerificationStatus('error', `<i class="bi bi-exclamation-triangle me-2"></i> ❌ ${error.message || 'Something went wrong. Please try again.'}`);
                showToast('❌ Error processing deposit. Please try again.', 'error');
            }
            
            verifyBtn.disabled = false;
            verifyBtn.innerHTML = '<i class="bi bi-check-circle me-1"></i>Verify';
        });

    } catch (error) {
        console.error('Error loading deposit page:', error);
        document.getElementById('depositContent').innerHTML = `
            <div class="text-center py-5">
                <i class="bi bi-exclamation-triangle text-danger fs-1 d-block mb-3"></i>
                <h4>Error Loading Page</h4>
                <p class="text-muted">${error.message || 'Please check your internet connection.'}</p>
                <button class="btn btn-primary-custom mt-3" onclick="location.reload()">Refresh</button>
            </div>
        `;
    }
});
</script>
