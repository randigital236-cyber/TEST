<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Login - RND Staking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background: radial-gradient(ellipse at center, rgba(46, 204, 113, 0.05), transparent 70%);
        }
        .login-card {
            background: rgba(19, 34, 55, 0.92);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(46, 204, 113, 0.12);
            border-radius: 24px;
            padding: 40px 35px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }
        .login-card:hover {
            border-color: rgba(46, 204, 113, 0.25);
            transform: translateY(-3px);
        }
        .login-card .logo {
            font-size: 2rem;
            font-weight: 900;
            color: #fff;
        }
        .login-card .logo i {
            color: #2ecc71;
        }
        .login-card .subtitle {
            color: #8899bb;
            font-size: 0.9rem;
            margin-top: 4px;
        }
        .login-card .form-label {
            color: #8899bb;
            font-weight: 500;
            font-size: 0.85rem;
        }
        .login-card .form-control {
            background: rgba(8, 14, 26, 0.8);
            border: 1px solid rgba(46, 204, 113, 0.12);
            color: #f0f4ff;
            padding: 12px 16px;
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        .login-card .form-control:focus {
            border-color: #2ecc71;
            box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.12);
        }
        .login-card .form-control::placeholder {
            color: #556688;
        }
        .login-card .btn-login {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            color: #fff;
            font-weight: 700;
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            font-size: 1rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .login-card .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(46, 204, 113, 0.3);
        }
        .login-card .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .login-card .register-link {
            color: #8899bb;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 16px;
        }
        .login-card .register-link a {
            color: #2ecc71;
            font-weight: 600;
            text-decoration: none;
        }
        .login-card .register-link a:hover {
            text-decoration: underline;
        }
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            max-width: 400px;
        }
        .toast-custom {
            background: rgba(19, 34, 55, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(46, 204, 113, 0.15);
            border-radius: 16px;
            padding: 14px 20px;
            color: #f0f4ff;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.4s ease;
            margin-bottom: 10px;
        }
        .toast-custom.error { border-left: 4px solid #ef4444; }
        .toast-custom.success { border-left: 4px solid #2ecc71; }
        .toast-custom i { font-size: 1.4rem; }
        .toast-custom .toast-msg { flex: 1; font-size: 0.85rem; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @media (max-width: 480px) {
            .login-card { padding: 30px 20px; }
            .login-card .logo { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="text-center mb-4">
                <div class="logo">
                    <i class="bi bi-currency-bitcoin me-2"></i>RND Staking
                </div>
                <p class="subtitle">Welcome back! Login to your account</p>
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="loginEmail" class="form-control" placeholder="Enter your email" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" id="loginPassword" class="form-control" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Login
                </button>
            </form>

            <div class="register-link">
                Don't have an account? <a href="register.html">Register Now</a>
            </div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
        }
    }
    </script>
    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
