<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Login - RND Staking</title>
    
    <!-- ============================================================
    EXTERNAL CSS
    ============================================================ -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <style>
        /* ============================================================
           RND STAKING - LOGIN PAGE STYLES
           ============================================================ */

        /* ============================================================
           GLOBAL RESET & BASE
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #080e1a 0%, #0f1f3a 50%, #1a2a4a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ============================================================
           CONTAINER
           ============================================================ */
        .login-container {
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
        }

        /* ============================================================
           GLASS CARD
           ============================================================ */
        .card-glass {
            background: rgba(19, 34, 55, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(46, 204, 113, 0.15);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.5s ease;
        }

        /* ============================================================
           LOGO
           ============================================================ */
        .logo-text {
            font-size: 1.8rem;
            font-weight: 800;
            color: #fff;
        }

        .logo-text span {
            color: #2ecc71;
        }

        .logo-text i {
            font-size: 1.6rem;
        }

        .sub-text {
            color: #8899bb;
            font-size: 0.85rem;
            margin-top: 4px;
        }

        /* ============================================================
           FORM ELEMENTS
           ============================================================ */
        .form-label {
            font-weight: 600;
            color: #a0b8d0;
            font-size: 0.9rem;
            margin-bottom: 6px;
        }

        .form-label .required {
            color: #ef4444;
        }

        .form-control-custom {
            background: rgba(8, 14, 26, 0.8) !important;
            border: 1px solid rgba(46, 204, 113, 0.15) !important;
            color: #f0f4ff !important;
            padding: 12px 16px !important;
            border-radius: 12px !important;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-control-custom::placeholder {
            color: #556688 !important;
        }

        .form-control-custom:focus {
            border-color: #2ecc71 !important;
            box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.15) !important;
            background: rgba(8, 14, 26, 0.9) !important;
        }

        .form-control-custom.is-invalid {
            border-color: #ef4444 !important;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15) !important;
        }

        .form-control-custom.is-valid {
            border-color: #2ecc71 !important;
            box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.15) !important;
        }

        /* ============================================================
           PASSWORD TOGGLE
           ============================================================ */
        .password-wrapper {
            position: relative;
        }

        .password-wrapper .form-control-custom {
            padding-right: 48px !important;
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #556688;
            cursor: pointer;
            padding: 4px;
            font-size: 1.1rem;
            transition: color 0.3s ease;
        }

        .password-toggle:hover {
            color: #2ecc71;
        }

        /* ============================================================
           FORGOT PASSWORD
           ============================================================ */
        .forgot-password {
            text-align: right;
            margin-top: 4px;
        }

        .forgot-password a {
            color: #556688;
            font-size: 0.8rem;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .forgot-password a:hover {
            color: #2ecc71;
            text-decoration: underline;
        }

        /* ============================================================
           BUTTONS
           ============================================================ */
        .btn-primary-custom {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            transition: all 0.3s ease;
            font-size: 1rem;
            cursor: pointer;
            position: relative;
        }

        .btn-primary-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(46, 204, 113, 0.3);
            color: #fff;
        }

        .btn-primary-custom:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-primary-custom:disabled:hover {
            box-shadow: none;
        }

        .btn-primary-custom .spinner-border {
            width: 1.2rem;
            height: 1.2rem;
        }

        /* ============================================================
           TEXT LINKS
           ============================================================ */
        .text-link {
            color: #2ecc71;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .text-link:hover {
            text-decoration: underline;
            color: #27ae60;
        }

        /* ============================================================
           TOAST CONTAINER
           ============================================================ */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            max-width: 400px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast-custom {
            background: rgba(19, 34, 55, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(46, 204, 113, 0.2);
            border-radius: 16px;
            padding: 16px 20px;
            color: #f0f4ff;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.4s ease;
            pointer-events: auto;
            transition: all 0.3s ease;
        }

        .toast-custom.success {
            border-left: 4px solid #2ecc71;
        }

        .toast-custom.error {
            border-left: 4px solid #ef4444;
        }

        .toast-custom.warning {
            border-left: 4px solid #f59e0b;
        }

        .toast-custom.info {
            border-left: 4px solid #60a5fa;
        }

        .toast-custom i {
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .toast-custom .toast-msg {
            flex: 1;
            font-size: 0.9rem;
        }

        /* ============================================================
           ANIMATIONS
           ============================================================ */
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 576px) {
            .card-glass {
                padding: 1.5rem;
                border-radius: 20px;
            }
            
            .logo-text {
                font-size: 1.5rem;
            }
            
            .toast-container {
                top: 10px;
                right: 10px;
                left: 10px;
                max-width: none;
            }
            
            .toast-custom {
                padding: 12px 16px;
            }
        }

        @media (max-width: 400px) {
            .card-glass {
                padding: 1rem;
                border-radius: 16px;
            }
            
            .form-control-custom {
                padding: 10px 14px !important;
                font-size: 0.85rem;
            }
            
            .btn-primary-custom {
                padding: 12px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

<!-- ============================================================
TOAST CONTAINER
============================================================ -->
<div class="toast-container" id="toastContainer"></div>

<!-- ============================================================
LOGIN CONTAINER
============================================================ -->
<div class="login-container">
    <div class="card-glass">
        
        <!-- ===== LOGO ===== -->
        <div class="text-center mb-4">
            <div class="logo-text">
                <i class="bi bi-currency-bitcoin me-2"></i>RND<span>Staking</span>
            </div>
            <p class="sub-text">Welcome back! Login to your account</p>
        </div>

        <!-- ===== LOGIN FORM ===== -->
        <form id="loginForm" novalidate>
            
            <!-- Email -->
            <div class="mb-3">
                <label class="form-label" for="loginEmail">
                    Email Address <span class="required">*</span>
                </label>
                <input 
                    type="email" 
                    id="loginEmail" 
                    class="form-control form-control-custom" 
                    placeholder="you@example.com" 
                    required 
                    autofocus
                />
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label class="form-label" for="loginPassword">
                    Password <span class="required">*</span>
                </label>
                <div class="password-wrapper">
                    <input 
                        type="password" 
                        id="loginPassword" 
                        class="form-control form-control-custom" 
                        placeholder="Enter your password" 
                        required 
                        minlength="6"
                    />
                    <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <!-- Forgot Password -->
            <div class="forgot-password">
                <a href="forgot-password.html">Forgot Password?</a>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn-primary-custom mt-3" id="loginBtn">
                Login <i class="bi bi-arrow-right ms-2"></i>
            </button>
        </form>

        <!-- ===== REGISTER LINK ===== -->
        <p class="text-center mt-4 text-muted small">
            Don't have an account? <a href="register.html" class="text-link">Create Account</a>
        </p>
    </div>
</div>

<!-- ============================================================
EXTERNAL SCRIPTS
============================================================ -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

<!-- ============================================================
ES MODULES (type="importmap" required for ES Modules)
============================================================ -->
<script type="importmap">
{
    "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
    }
}
</script>

<!-- ============================================================
PROJECT SCRIPTS (Complete Login JS)
============================================================ -->
<script type="module">
// ============================================================
// RND STAKING PLATFORM V2 - LOGIN.JS
// ============================================================
// 📌 PROJECT: mywebsite-600d3
// 📌 RULE: Firebase Auth UID = User ID = Referral Code
// ============================================================

import { 
    auth, 
    database,
    signInWithEmailAndPassword,
    onAuthStateChanged,
    ref,
    update,
    get,
    getCurrentTimestamp,
    createLog
} from './firebase.js';

// ============================================================
// 🔥 DOM REFERENCES
// ============================================================
const form = document.getElementById('loginForm');
const emailInput = document.getElementById('loginEmail');
const passwordInput = document.getElementById('loginPassword');
const loginBtn = document.getElementById('loginBtn');
const passwordToggle = document.getElementById('passwordToggle');
const toastContainer = document.getElementById('toastContainer');

// ============================================================
// 🔥 TOAST FUNCTION
// ============================================================
function showToast(message, type = 'success') {
    if (!toastContainer) {
        console.error('Toast container not found');
        return;
    }
    
    const toast = document.createElement('div');
    toast.className = `toast-custom ${type}`;
    
    const icons = {
        success: 'bi-check-circle-fill text-success',
        error: 'bi-exclamation-triangle-fill text-danger',
        warning: 'bi-exclamation-triangle-fill text-warning',
        info: 'bi-info-circle-fill text-info'
    };
    
    const icon = icons[type] || icons.info;
    
    toast.innerHTML = `
        <i class="bi ${icon}"></i>
        <span class="toast-msg">${message}</span>
    `;
    
    toastContainer.appendChild(toast);
    
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(100%)';
        setTimeout(() => {
            if (toast.parentNode) {
                toast.remove();
            }
        }, 300);
    }, 5000);
}

// ============================================================
// 🔥 SET LOADING STATE
// ============================================================
function setLoading(isLoading) {
    if (!loginBtn) return;
    if (isLoading) {
        loginBtn.disabled = true;
        loginBtn.innerHTML = `
            <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
            Logging in...
        `;
    } else {
        loginBtn.disabled = false;
        loginBtn.innerHTML = 'Login <i class="bi bi-arrow-right ms-2"></i>';
    }
}

// ============================================================
// 🔥 PASSWORD TOGGLE
// ============================================================
if (passwordToggle) {
    passwordToggle.addEventListener('click', function() {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        this.querySelector('i').classList.toggle('bi-eye');
        this.querySelector('i').classList.toggle('bi-eye-slash');
    });
}

// ============================================================
// 🔥 UPDATE LAST LOGIN
// ============================================================
async function updateLastLogin(uid) {
    try {
        const userRef = ref(database, 'users/' + uid);
        await update(userRef, {
            lastLogin: getCurrentTimestamp()
        });
        console.log('✅ Last login updated');
    } catch (error) {
        console.error('Error updating last login:', error);
    }
}

// ============================================================
// 🔥 CHECK USER STATUS
// ============================================================
async function checkUserStatus(uid) {
    try {
        const userRef = ref(database, 'users/' + uid);
        const snapshot = await get(userRef);
        
        if (!snapshot.exists()) {
            return { valid: false, error: 'User not found' };
        }
        
        const userData = snapshot.val();
        
        if (userData.isBlocked === true) {
            return { valid: false, error: 'Your account has been blocked. Please contact support.' };
        }
        
        if (userData.isDeleted === true) {
            return { valid: false, error: 'Your account has been deleted.' };
        }
        
        if (userData.isActive === false) {
            return { valid: false, error: 'Your account is inactive. Please contact support.' };
        }
        
        return { valid: true, userData: userData };
    } catch (error) {
        console.error('Error checking user status:', error);
        return { valid: false, error: 'Error checking account status' };
    }
}

// ============================================================
// 🔥 LOGIN USER
// ============================================================
async function loginUser(event) {
    event.preventDefault();
    
    // ============================================================
    // STEP 1: GET FORM VALUES
    // ============================================================
    const email = emailInput.value.trim();
    const password = passwordInput.value;
    
    console.log('📝 Login attempt for:', email);
    
    // ============================================================
    // STEP 2: VALIDATE FORM
    // ============================================================
    if (!email) {
        showToast('❌ Please enter your email address', 'error');
        emailInput.focus();
        return;
    }
    
    if (!password) {
        showToast('❌ Please enter your password', 'error');
        passwordInput.focus();
        return;
    }
    
    // ============================================================
    // STEP 3: DISABLE BUTTON & SHOW LOADING
    // ============================================================
    setLoading(true);
    
    try {
        // ============================================================
        // STEP 4: SIGN IN WITH FIREBASE AUTH
        // ============================================================
        console.log('🔐 Signing in...');
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        const uid = user.uid;
        
        console.log('✅ Login successful. UID:', uid);
        
        // ============================================================
        // STEP 5: CHECK USER STATUS
        // ============================================================
        const statusCheck = await checkUserStatus(uid);
        if (!statusCheck.valid) {
            showToast('❌ ' + statusCheck.error, 'error');
            // Sign out if account is not valid
            await signOut(auth);
            setLoading(false);
            return;
        }
        
        // ============================================================
        // STEP 6: UPDATE LAST LOGIN
        // ============================================================
        await updateLastLogin(uid);
        
        // ============================================================
        // STEP 7: CREATE LOG
        // ============================================================
        await createLog('info', 'User logged in', {
            uid: uid,
            email: email
        });
        
        // ============================================================
        // STEP 8: SUCCESS
        // ============================================================
        console.log('✅ Login completed successfully');
        showToast('🎉 Welcome back, ' + (statusCheck.userData.name || 'User') + '!', 'success');
        
        // Reset form
        form.reset();
        
        // ============================================================
        // STEP 9: REDIRECT TO DASHBOARD
        // ============================================================
        setTimeout(() => {
            window.location.href = 'dashboard.html';
        }, 1500);
        
    } catch (error) {
        // ============================================================
        // STEP 10: ERROR HANDLING
        // ============================================================
        console.error('❌ Login Error:', error);
        
        let errorMessage = 'Login failed. Please try again.';
        
        switch (error.code) {
            case 'auth/user-not-found':
                errorMessage = '❌ No account found with this email. Please register first.';
                break;
            case 'auth/wrong-password':
                errorMessage = '❌ Incorrect password. Please try again.';
                break;
            case 'auth/invalid-email':
                errorMessage = '❌ Please enter a valid email address.';
                break;
            case 'auth/user-disabled':
                errorMessage = '❌ This account has been disabled. Please contact support.';
                break;
            case 'auth/too-many-requests':
                errorMessage = '❌ Too many failed attempts. Please try again later.';
                break;
            case 'auth/network-request-failed':
                errorMessage = '❌ Network error. Please check your connection.';
                break;
            case 'auth/invalid-credential':
                errorMessage = '❌ Invalid credentials. Please check your email and password.';
                break;
            default:
                errorMessage = '❌ ' + (error.message || 'Login failed. Please try again.');
        }
        
        showToast(errorMessage, 'error');
        
        // ✅ Create error log
        await createLog('error', 'Login failed', {
            email: email,
            errorCode: error.code,
            errorMessage: error.message
        });
        
    } finally {
        // ============================================================
        // STEP 11: RE-ENABLE BUTTON
        // ============================================================
        setLoading(false);
    }
}

// ============================================================
// 🔥 FORM SUBMIT LISTENER
// ============================================================
if (form) {
    form.addEventListener('submit', loginUser);
}

// ============================================================
// 🔥 AUTH STATE LISTENER (Redirect if already logged in)
// ============================================================
onAuthStateChanged(auth, (user) => {
    if (user) {
        console.log('👤 User already logged in:', user.uid);
        // Redirect to dashboard if already logged in
        window.location.href = 'dashboard.html';
    }
});

// ============================================================
// 🔥 KEYBOARD SHORTCUT: Enter to Submit
// ============================================================
document.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' && event.target.tagName === 'INPUT') {
        const form = event.target.closest('form');
        if (form && form.id === 'loginForm') {
            event.preventDefault();
            form.dispatchEvent(new Event('submit'));
        }
    }
});

// ============================================================
// 🔥 INIT LOG
// ============================================================
console.log('✅ Login module loaded successfully');
console.log('📌 Project: mywebsite-600d3');
console.log('📌 Rule: Firebase Auth UID = User ID = Referral Code');
</script>

</body>
</html>
