<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Invoice · RND Staking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .invoice-wrapper {
            max-width: 820px;
            width: 100%;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.12);
            overflow: hidden;
        }
        /* HEADER */
        .invoice-header {
            background: linear-gradient(135deg, #0a0e1a, #1a2236);
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .invoice-header .logo {
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .invoice-header .logo .icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #fff;
        }
        .invoice-header .title {
            text-align: right;
        }
        .invoice-header .title h2 {
            font-size: 18px;
            font-weight: 600;
            color: #22c55e;
        }
        .invoice-header .title .num {
            font-size: 13px;
            color: #8899bb;
        }
        /* BODY */
        .invoice-body { padding: 30px 40px; }
        /* DETAILS */
        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px 30px;
            margin-bottom: 20px;
        }
        .details-grid .item .label {
            font-size: 11px;
            color: #6b7280;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .details-grid .item .value {
            font-size: 15px;
            font-weight: 600;
            color: #111827;
            margin-top: 2px;
        }
        .details-grid .item .value.green { color: #22c55e; }
        .details-grid .item .value.blue { color: #3b82f6; }
        /* DIVIDER */
        .divider { border: none; border-top: 1px solid #e5e7eb; margin: 16px 0; }
        /* TABLE */
        .invoice-table { width: 100%; border-collapse: collapse; margin: 12px 0 16px; }
        .invoice-table th {
            background: #f9fafb;
            padding: 10px 12px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 2px solid #e5e7eb;
        }
        .invoice-table th:last-child { text-align: right; }
        .invoice-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #e5e7eb;
            font-size: 14px;
            color: #111827;
        }
        .invoice-table td:last-child { text-align: right; font-weight: 600; }
        .invoice-table .total td {
            padding: 14px 12px;
            border-top: 2px solid #e5e7eb;
            font-size: 16px;
            font-weight: 700;
            background: #f9fafb;
        }
        .invoice-table .total td:last-child { color: #22c55e; font-size: 18px; }
        /* STATUS */
        .status-badge {
            display: inline-block;
            padding: 3px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            background: #dcfce7;
            color: #22c55e;
        }
        /* INFO BOX */
        .info-box {
            background: #f9fafb;
            border-radius: 10px;
            padding: 14px 18px;
            margin-top: 12px;
            font-size: 13px;
            color: #6b7280;
            line-height: 1.8;
        }
        .info-box strong { color: #111827; }
        .info-box .highlight { color: #22c55e; font-weight: 600; }
        .info-box .blue { color: #3b82f6; font-weight: 600; }
        /* FOOTER */
        .invoice-footer {
            padding: 16px 40px 24px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 13px;
            color: #6b7280;
        }
        .invoice-footer .company .name { font-weight: 600; color: #111827; }
        .invoice-footer .actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-print {
            background: #0a0e1a;
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: 0.3s;
        }
        .btn-print:hover { background: #1a2236; transform: translateY(-2px); }
        .btn-back {
            background: #f3f4f6;
            color: #374151;
            border: 1px solid #d1d5db;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
        }
        .btn-back:hover { background: #e5e7eb; }
        .note {
            margin-top: 12px;
            font-size: 12px;
            color: #9ca3af;
            border-top: 1px solid #e5e7eb;
            padding-top: 12px;
            text-align: center;
        }
        @media (max-width: 600px) {
            .invoice-header { flex-direction: column; text-align: center; }
            .invoice-header .title { text-align: center; }
            .details-grid { grid-template-columns: 1fr; gap: 8px; }
            .invoice-body { padding: 20px; }
            .invoice-footer { flex-direction: column; text-align: center; }
        }
        @media print {
            body { background: #fff; padding: 0; }
            .invoice-wrapper { box-shadow: none; border: 1px solid #ddd; border-radius: 0; }
            .btn-print, .btn-back { display: none !important; }
            .invoice-header { background: #0a0e1a; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .invoice-header .logo .icon { background: #22c55e; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .status-badge { background: #dcfce7; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .invoice-table th { background: #f9fafb; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .invoice-table .total td { background: #f9fafb; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .info-box { background: #f9fafb; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>
    <div class="invoice-wrapper" id="invoiceContainer">
        <!-- INVOICE CONTENT WILL BE GENERATED BY JAVASCRIPT -->
    </div>

    <script>
    // ============================================================
    // 🔥 COMPLETE INVOICE GENERATOR
    // ============================================================

    (function() {
        'use strict';

        // ============================================================
        // 1. GET DATA FROM URL PARAMETERS
        // ============================================================
        
        function getURLParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                userName: params.get('name') || 'User',
                username: params.get('username') || 'user',
                email: params.get('email') || 'N/A',
                planName: params.get('plan') || 'Package',
                amount: parseFloat(params.get('amount')) || 0,
                totalRND: parseFloat(params.get('rnd')) || 0,
                dailyRelease: parseFloat(params.get('daily')) || 0,
                planDays: parseInt(params.get('days')) || 0,
                bonus: parseInt(params.get('bonus')) || 0,
                rndPrice: parseFloat(params.get('price')) || 1,
                packageId: params.get('pid') || '',
                timestamp: parseInt(params.get('ts')) || Date.now()
            };
        }

        // ============================================================
        // 2. HELPERS
        // ============================================================

        function formatDate(ts) {
            const d = new Date(ts);
            return d.toLocaleDateString('en-IN', {
                day: '2-digit',
                month: 'short',
                year: 'numeric'
            });
        }

        function formatTime(ts) {
            const d = new Date(ts);
            return d.toLocaleTimeString('en-IN', {
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function generateInvoiceNumber() {
            const ts = Date.now().toString(36).toUpperCase();
            const rand = Math.random().toString(36).substring(2, 6).toUpperCase();
            return `INV-${ts}-${rand}`;
        }

        // ============================================================
        // 3. GENERATE INVOICE HTML
        // ============================================================

        function generateInvoice(data) {
            const {
                userName = 'User',
                username = 'user',
                email = 'N/A',
                planName = 'Package',
                amount = 0,
                totalRND = 0,
                dailyRelease = 0,
                planDays = 0,
                bonus = 0,
                rndPrice = 1,
                packageId = '',
                timestamp = Date.now()
            } = data;

            const invoiceNumber = generateInvoiceNumber();
            const date = formatDate(timestamp);
            const time = formatTime(timestamp);
            const formattedAmount = '$' + amount.toFixed(2) + ' USDT';
            const formattedRND = totalRND.toFixed(2) + ' RND';
            const formattedDaily = dailyRelease.toFixed(4) + ' RND';
            const bonusText = bonus + '%';

            return `
                <!-- HEADER -->
                <div class="invoice-header">
                    <div class="logo">
                        <div class="icon">R</div>
                        <span>RND Staking</span>
                    </div>
                    <div class="title">
                        <h2>📦 Package Invoice</h2>
                        <div class="num">#${invoiceNumber}</div>
                    </div>
                </div>

                <!-- BODY -->
                <div class="invoice-body">
                    <!-- DETAILS -->
                    <div class="details-grid">
                        <div class="item">
                            <div class="label">Customer</div>
                            <div class="value">${userName}</div>
                        </div>
                        <div class="item">
                            <div class="label">User ID</div>
                            <div class="value">${username}</div>
                        </div>
                        <div class="item">
                            <div class="label">Email</div>
                            <div class="value">${email}</div>
                        </div>
                        <div class="item">
                            <div class="label">Invoice Date</div>
                            <div class="value">${date} ${time}</div>
                        </div>
                        <div class="item">
                            <div class="label">Package</div>
                            <div class="value green">${planName}</div>
                        </div>
                        <div class="item">
                            <div class="label">Status</div>
                            <div class="value"><span class="status-badge">✅ Paid</span></div>
                        </div>
                    </div>

                    <hr class="divider" />

                    <!-- TABLE -->
                    <table class="invoice-table">
                        <thead>
                            <tr>
                                <th>Description</th>
                                <th>Amount</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>
                                    <div style="font-weight:600;">${planName}</div>
                                    <div style="font-size:12px;color:#6b7280;margin-top:2px;">
                                        ${planDays} Days · ${bonusText} Bonus · Daily: ${formattedDaily}
                                    </div>
                                </td>
                                <td>${formattedAmount}</td>
                            </tr>
                            <tr>
                                <td style="color:#6b7280;font-size:13px;">RND Received</td>
                                <td style="color:#3b82f6;">${formattedRND}</td>
                            </tr>
                            <tr>
                                <td style="color:#6b7280;font-size:13px;">RND Price at Purchase</td>
                                <td>$${rndPrice.toFixed(4)}</td>
                            </tr>
                            <tr>
                                <td style="color:#6b7280;font-size:13px;">Package ID</td>
                                <td style="font-weight:400;font-family:monospace;font-size:12px;color:#6b7280;">${packageId}</td>
                            </tr>
                            <tr class="total">
                                <td>Total</td>
                                <td>${formattedAmount}</td>
                            </tr>
                        </tbody>
                    </table>

                    <!-- INFO BOX -->
                    <div class="info-box">
                        <strong>📈 Daily Release:</strong> <span class="highlight">${formattedDaily}</span> per day for <strong>${planDays}</strong> days
                        <br />
                        <strong>🔒 Lock Period:</strong> ${planDays} days from purchase date
                        <br />
                        <strong>📊 Total RND:</strong> <span class="blue">${formattedRND}</span> (including <span class="highlight">${bonusText}</span> bonus)
                        <br />
                        <strong>⏰ Release Start:</strong> Tomorrow from purchase date
                    </div>
                </div>

                <!-- FOOTER -->
                <div class="invoice-footer">
                    <div class="company">
                        <div class="name">RND Staking</div>
                        <div>RanDigital, India</div>
                        <div>support@randigital.in | +91-XXXXXXXXXX</div>
                        <div style="font-size:12px;color:#9ca3af;">https://staking.randigital.in</div>
                    </div>
                    <div class="actions">
                        <a href="dashboard.html" class="btn-back">
                            <i class="bi bi-arrow-left" style="margin-right:6px;"></i> Back
                        </a>
                        <button class="btn-print" onclick="window.print()">
                            <i class="bi bi-printer" style="margin-right:6px;"></i> Print / PDF
                        </button>
                    </div>
                </div>

                <div class="note">
                    <i class="bi bi-info-circle" style="margin-right:4px;"></i>
                    System-generated invoice. Release starts from the next day of purchase.
                    For queries, contact support.
                </div>
            `;
        }

        // ============================================================
        // 4. LOAD INVOICE
        // ============================================================

        function loadInvoice() {
            const data = getURLParams();
            const container = document.getElementById('invoiceContainer');
            if (container) {
                container.innerHTML = generateInvoice(data);
            }
        }

        // ============================================================
        // 5. AUTO-LOAD ON PAGE READY
        // ============================================================

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadInvoice);
        } else {
            loadInvoice();
        }

        // ============================================================
        // 6. AUTO-PRINT (optional - remove if not needed)
        // ============================================================
        // Uncomment below line if you want auto-print when invoice opens
        // setTimeout(() => { window.print(); }, 1000);

    })();
    </script>

</body>
</html>
