<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Register · RND Staking</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0e1a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-wrapper {
            max-width: 440px;
            width: 100%;
            background: #1a2236;
            border-radius: 24px;
            padding: 40px 32px;
            border: 1px solid #2a3a5a;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }
        .register-wrapper .brand {
            text-align: center;
            margin-bottom: 28px;
        }
        .register-wrapper .brand .logo {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: 800;
            color: #fff;
            margin: 0 auto 12px;
        }
        .register-wrapper .brand h1 {
            font-size: 24px;
            font-weight: 700;
        }
        .register-wrapper .brand p {
            color: #8899bb;
            font-size: 14px;
            margin-top: 4px;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #8899bb;
            margin-bottom: 6px;
        }
        .form-group label .optional {
            color: #5a6a8a;
            font-weight: 400;
            font-size: 12px;
        }
        .form-group .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: #0f1729;
            border: 1px solid #2a3a5a;
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        .form-group .input-wrapper:focus-within {
            border-color: #22c55e;
            box-shadow: 0 0 0 3px rgba(34,197,94,0.1);
        }
        .form-group .input-wrapper i {
            position: absolute;
            left: 14px;
            color: #5a6a8a;
            font-size: 18px;
        }
        .form-group .input-wrapper input {
            width: 100%;
            padding: 14px 14px 14px 46px;
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 15px;
            outline: none;
            font-family: 'Inter', sans-serif;
        }
        .form-group .input-wrapper input::placeholder {
            color: #5a6a8a;
        }
        .form-group .input-wrapper .toggle-password {
            position: absolute;
            right: 14px;
            background: none;
            border: none;
            color: #5a6a8a;
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
        }
        .form-group .input-wrapper .toggle-password:hover {
            color: #8899bb;
        }
        .form-hint {
            font-size: 12px;
            color: #5a6a8a;
            margin-top: 4px;
        }
        .form-hint.error { color: #ef4444; }
        .form-hint.success { color: #22c55e; }
        .btn-register {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            margin-top: 4px;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(34,197,94,0.3);
        }
        .btn-register:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }
        .btn-register .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 20px 0;
            color: #5a6a8a;
            font-size: 13px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #2a3a5a;
        }
        .btn-google {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.06);
            border: 1px solid #2a3a5a;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-google:hover {
            background: rgba(255,255,255,0.1);
            border-color: #22c55e;
        }
        .btn-google i { font-size: 20px; color: #ea4335; }
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #8899bb;
            font-size: 14px;
        }
        .login-link a {
            color: #22c55e;
            text-decoration: none;
            font-weight: 600;
        }
        .login-link a:hover { text-decoration: underline; }
        .error-msg {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 10px;
            padding: 10px 14px;
            color: #ef4444;
            font-size: 14px;
            display: none;
            margin-bottom: 16px;
        }
        .error-msg.show { display: block; }
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            max-width: 400px;
            width: 100%;
        }
        .toast-custom {
            background: #1a2236;
            border: 1px solid #2a3a5a;
            border-radius: 12px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            animation: slideIn 0.4s ease;
            margin-bottom: 10px;
            color: #fff;
            font-size: 14px;
            border-left: 4px solid #22c55e;
        }
        .toast-custom.error { border-left-color: #ef4444; }
        .toast-custom i { font-size: 20px; }
        .toast-custom .toast-msg { flex: 1; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @media (max-width: 480px) {
            .register-wrapper { padding: 28px 20px; }
        }
    </style>
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>

    <div class="register-wrapper">
        <!-- Brand -->
        <div class="brand">
            <div class="logo">R</div>
            <h1>RND Staking</h1>
            <p>Create your account and start staking</p>
        </div>

        <!-- Error Message -->
        <div class="error-msg" id="errorMsg"></div>

        <!-- Register Form -->
        <form id="registerForm">
            <div class="form-group">
                <label>Full Name</label>
                <div class="input-wrapper">
                    <i class="bi bi-person"></i>
                    <input type="text" id="registerName" placeholder="Enter your full name" required>
                </div>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i class="bi bi-envelope"></i>
                    <input type="email" id="registerEmail" placeholder="Enter your email" required autocomplete="email">
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="bi bi-lock"></i>
                    <input type="password" id="registerPassword" placeholder="Create a password (min 6 characters)" required>
                    <button type="button" class="toggle-password" onclick="togglePassword('registerPassword', this)">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
                <div class="form-hint" id="passwordStrength">Use at least 6 characters</div>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <div class="input-wrapper">
                    <i class="bi bi-lock"></i>
                    <input type="password" id="registerConfirmPassword" placeholder="Confirm your password" required>
                </div>
                <div class="form-hint" id="confirmMatch">Passwords must match</div>
            </div>

            <div class="form-group">
                <label>Referral Code <span class="optional">(Optional)</span></label>
                <div class="input-wrapper">
                    <i class="bi bi-gift"></i>
                    <input type="text" id="registerReferral" placeholder="Enter referral code if any">
                </div>
                <div class="form-hint">Leave blank if you don't have a referral code</div>
            </div>

            <button type="submit" class="btn-register" id="registerBtn">
                <i class="bi bi-person-plus me-2"></i> Create Account
            </button>
        </form>

        <div class="divider">or continue with</div>

        <button class="btn-google" id="googleRegisterBtn">
            <i class="bi bi-google"></i> Continue with Google
        </button>

        <div class="login-link">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "./": "./"
        }
    }
    </script>

    <script type="module">
        import { signUp, signInWithGoogle, onAuthChange } from './auth.js';
        import { showToast } from './toast.js';

        // DOM References
        const form = document.getElementById('registerForm');
        const nameInput = document.getElementById('registerName');
        const emailInput = document.getElementById('registerEmail');
        const passwordInput = document.getElementById('registerPassword');
        const confirmInput = document.getElementById('registerConfirmPassword');
        const referralInput = document.getElementById('registerReferral');
        const registerBtn = document.getElementById('registerBtn');
        const googleBtn = document.getElementById('googleRegisterBtn');
        const errorMsg = document.getElementById('errorMsg');
        const strengthEl = document.getElementById('passwordStrength');
        const confirmMatchEl = document.getElementById('confirmMatch');

        // Toggle Password
        window.togglePassword = function(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'bi bi-eye';
            }
        };

        // Password Strength
        passwordInput.addEventListener('input', function() {
            const val = this.value;
            if (val.length === 0) {
                strengthEl.textContent = 'Use at least 6 characters';
                strengthEl.className = 'form-hint';
            } else if (val.length < 6) {
                strengthEl.textContent = '❌ Password is too short (min 6 characters)';
                strengthEl.className = 'form-hint error';
            } else if (val.length < 8) {
                strengthEl.textContent = '⚠️ Password is weak (use at least 8 characters)';
                strengthEl.className = 'form-hint';
            } else {
                strengthEl.textContent = '✅ Password looks good!';
                strengthEl.className = 'form-hint success';
            }
        });

        // Confirm Password Match
        confirmInput.addEventListener('input', function() {
            const password = passwordInput.value;
            const confirm = this.value;
            if (confirm.length === 0) {
                confirmMatchEl.textContent = 'Passwords must match';
                confirmMatchEl.className = 'form-hint';
            } else if (password === confirm) {
                confirmMatchEl.textContent = '✅ Passwords match!';
                confirmMatchEl.className = 'form-hint success';
            } else {
                confirmMatchEl.textContent = '❌ Passwords do not match';
                confirmMatchEl.className = 'form-hint error';
            }
        });

        // Show Error
        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.className = 'error-msg show';
            setTimeout(() => {
                errorMsg.className = 'error-msg';
            }, 5000);
        }

        // Register Handler
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = nameInput.value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const confirm = confirmInput.value;
            const referral = referralInput.value.trim() || null;

            // Validations
            if (!name || !email || !password || !confirm) {
                showError('Please fill in all required fields');
                return;
            }

            if (name.length < 2) {
                showError('Name must be at least 2 characters');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }

            if (password !== confirm) {
                showError('Passwords do not match');
                return;
            }

            registerBtn.disabled = true;
            registerBtn.innerHTML = '<span class="spinner"></span> Creating account...';

            try {
                const result = await signUp(email, password, name, referral);
                if (result.success) {
                    showToast('✅ Account created successfully! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    showError(result.error || 'Registration failed. Please try again.');
                    showToast('❌ ' + (result.error || 'Registration failed'), 'error');
                    registerBtn.disabled = false;
                    registerBtn.innerHTML = '<i class="bi bi-person-plus me-2"></i> Create Account';
                }
            } catch (error) {
                console.error('Registration error:', error);
                showError('An unexpected error occurred. Please try again.');
                showToast('❌ An unexpected error occurred', 'error');
                registerBtn.disabled = false;
                registerBtn.innerHTML = '<i class="bi bi-person-plus me-2"></i> Create Account';
            }
        });

        // Google Register
        googleBtn.addEventListener('click', async () => {
            googleBtn.disabled = true;
            googleBtn.innerHTML = '<span class="spinner"></span> Connecting...';

            try {
                const referral = referralInput.value.trim() || null;
                const result = await signInWithGoogle(referral, true);
                if (result.redirect) {
                    showToast('⏳ Redirecting to Google...', 'info');
                    return;
                }
                if (result.success) {
                    showToast('✅ Account created with Google!', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    showError(result.error || 'Google signup failed');
                    showToast('❌ ' + (result.error || 'Google signup failed'), 'error');
                    googleBtn.disabled = false;
                    googleBtn.innerHTML = '<i class="bi bi-google"></i> Continue with Google';
                }
            } catch (error) {
                console.error('Google signup error:', error);
                showError('Google signup failed. Please try again.');
                showToast('❌ Google signup failed', 'error');
                googleBtn.disabled = false;
                googleBtn.innerHTML = '<i class="bi bi-google"></i> Continue with Google';
            }
        });

        // Auto-login check
        onAuthChange((user) => {
            if (user) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>

</body>
</html>
