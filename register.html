<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Register - RND Staking</title>
    
    <!-- ============================================================
    EXTERNAL CSS
    ============================================================ -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <style>
        /* ============================================================
           RND STAKING - REGISTER PAGE STYLES
           ============================================================ */

        /* ============================================================
           GLOBAL RESET & BASE
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #080e1a 0%, #0f1f3a 50%, #1a2a4a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ============================================================
           CONTAINER
           ============================================================ */
        .register-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }

        /* ============================================================
           GLASS CARD
           ============================================================ */
        .card-glass {
            background: rgba(19, 34, 55, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(46, 204, 113, 0.15);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.5s ease;
        }

        /* ============================================================
           LOGO
           ============================================================ */
        .logo-text {
            font-size: 1.8rem;
            font-weight: 800;
            color: #fff;
        }

        .logo-text span {
            color: #2ecc71;
        }

        .logo-text i {
            font-size: 1.6rem;
        }

        .sub-text {
            color: #8899bb;
            font-size: 0.85rem;
            margin-top: 4px;
        }

        /* ============================================================
           FORM ELEMENTS
           ============================================================ */
        .form-label {
            font-weight: 600;
            color: #a0b8d0;
            font-size: 0.9rem;
            margin-bottom: 6px;
        }

        .form-label .required {
            color: #ef4444;
        }

        .form-control-custom {
            background: rgba(8, 14, 26, 0.8) !important;
            border: 1px solid rgba(46, 204, 113, 0.15) !important;
            color: #f0f4ff !important;
            padding: 12px 16px !important;
            border-radius: 12px !important;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-control-custom::placeholder {
            color: #556688 !important;
        }

        .form-control-custom:focus {
            border-color: #2ecc71 !important;
            box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.15) !important;
            background: rgba(8, 14, 26, 0.9) !important;
        }

        .form-control-custom.is-invalid {
            border-color: #ef4444 !important;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15) !important;
        }

        .form-control-custom.is-valid {
            border-color: #2ecc71 !important;
            box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.15) !important;
        }

        /* ============================================================
           REFERRAL NOTICE
           ============================================================ */
        .referral-notice {
            background: rgba(46, 204, 113, 0.05);
            border: 1px solid rgba(46, 204, 113, 0.1);
            border-radius: 12px;
            padding: 8px 12px;
            font-size: 0.8rem;
            color: #2ecc71;
            margin-top: 5px;
            transition: all 0.3s ease;
        }

        .referral-notice.active {
            border-color: rgba(46, 204, 113, 0.3);
            background: rgba(46, 204, 113, 0.08);
        }

        .referral-notice.invalid {
            border-color: rgba(239, 68, 68, 0.3);
            background: rgba(239, 68, 68, 0.08);
            color: #ef4444;
        }

        /* ============================================================
           BUTTONS
           ============================================================ */
        .btn-primary-custom {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            transition: all 0.3s ease;
            font-size: 1rem;
            cursor: pointer;
            position: relative;
        }

        .btn-primary-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(46, 204, 113, 0.3);
            color: #fff;
        }

        .btn-primary-custom:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-primary-custom:disabled:hover {
            box-shadow: none;
        }

        .btn-primary-custom .spinner-border {
            width: 1.2rem;
            height: 1.2rem;
        }

        /* ============================================================
           TEXT LINKS
           ============================================================ */
        .text-link {
            color: #2ecc71;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .text-link:hover {
            text-decoration: underline;
            color: #27ae60;
        }

        /* ============================================================
           TOAST CONTAINER
           ============================================================ */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            max-width: 400px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast-custom {
            background: rgba(19, 34, 55, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(46, 204, 113, 0.2);
            border-radius: 16px;
            padding: 16px 20px;
            color: #f0f4ff;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.4s ease;
            pointer-events: auto;
            transition: all 0.3s ease;
        }

        .toast-custom.success {
            border-left: 4px solid #2ecc71;
        }

        .toast-custom.error {
            border-left: 4px solid #ef4444;
        }

        .toast-custom.warning {
            border-left: 4px solid #f59e0b;
        }

        .toast-custom.info {
            border-left: 4px solid #60a5fa;
        }

        .toast-custom i {
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .toast-custom .toast-msg {
            flex: 1;
            font-size: 0.9rem;
        }

        /* ============================================================
           ANIMATIONS
           ============================================================ */
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 576px) {
            .card-glass {
                padding: 1.5rem;
                border-radius: 20px;
            }
            
            .logo-text {
                font-size: 1.5rem;
            }
            
            .toast-container {
                top: 10px;
                right: 10px;
                left: 10px;
                max-width: none;
            }
            
            .toast-custom {
                padding: 12px 16px;
            }
        }

        @media (max-width: 400px) {
            .card-glass {
                padding: 1rem;
                border-radius: 16px;
            }
            
            .form-control-custom {
                padding: 10px 14px !important;
                font-size: 0.85rem;
            }
            
            .btn-primary-custom {
                padding: 12px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

<!-- ============================================================
TOAST CONTAINER
============================================================ -->
<div class="toast-container" id="toastContainer"></div>

<!-- ============================================================
REGISTER CONTAINER
============================================================ -->
<div class="register-container">
    <div class="card-glass">
        
        <!-- ===== LOGO ===== -->
        <div class="text-center mb-4">
            <div class="logo-text">
                <i class="bi bi-currency-bitcoin me-2"></i>RND<span>Staking</span>
            </div>
            <p class="sub-text">Create your account to get started</p>
        </div>

        <!-- ===== REGISTRATION FORM ===== -->
        <form id="registerForm" novalidate>
            
            <!-- Full Name -->
            <div class="mb-3">
                <label class="form-label" for="regName">
                    Full Name <span class="required">*</span>
                </label>
                <input 
                    type="text" 
                    id="regName" 
                    class="form-control form-control-custom" 
                    placeholder="Enter your full name" 
                    required 
                    autofocus
                />
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label class="form-label" for="regEmail">
                    Email Address <span class="required">*</span>
                </label>
                <input 
                    type="email" 
                    id="regEmail" 
                    class="form-control form-control-custom" 
                    placeholder="you@example.com" 
                    required
                />
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label class="form-label" for="regPassword">
                    Password <span class="required">*</span>
                </label>
                <input 
                    type="password" 
                    id="regPassword" 
                    class="form-control form-control-custom" 
                    placeholder="Min. 6 characters" 
                    required 
                    minlength="6"
                />
            </div>

            <!-- Confirm Password -->
            <div class="mb-3">
                <label class="form-label" for="regConfirmPassword">
                    Confirm Password <span class="required">*</span>
                </label>
                <input 
                    type="password" 
                    id="regConfirmPassword" 
                    class="form-control form-control-custom" 
                    placeholder="Re-enter your password" 
                    required 
                    minlength="6"
                />
            </div>

            <!-- Referral Code -->
            <div class="mb-3">
                <label class="form-label" for="regRef">
                    Referral Code 
                    <span style="font-size:0.65rem;background:rgba(46,204,113,0.15);color:#2ecc71;padding:2px 10px;border-radius:20px;font-weight:500;margin-left:6px;">
                        Optional
                    </span>
                </label>
                <input 
                    type="text" 
                    id="regRef" 
                    class="form-control form-control-custom" 
                    placeholder="Enter referrer's User ID" 
                    style="background:#0a1425 !important;"
                />
                <div class="referral-notice" id="referralNotice">
                    <i class="bi bi-info-circle me-1"></i>
                    <span id="referralNoticeText">Enter referrer's User ID if you have one</span>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn-primary-custom" id="registerBtn">
                Create Account <i class="bi bi-arrow-right ms-2"></i>
            </button>
        </form>

        <!-- ===== LOGIN LINK ===== -->
        <p class="text-center mt-4 text-muted small">
            Already have an account? <a href="login.html" class="text-link">Login</a>
        </p>
    </div>
</div>

<!-- ============================================================
EXTERNAL SCRIPTS
============================================================ -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

<!-- ============================================================
ES MODULES (type="importmap" required for ES Modules)
============================================================ -->
<script type="importmap">
{
    "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
    }
}
</script>

<!-- ============================================================
PROJECT SCRIPTS
============================================================ -->
<script type="module" src="register.js"></script>

</body>
</html>
