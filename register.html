<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Register - RND Staking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #080e1a 0%, #0f1f3a 50%, #1a2a4a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .register-container {
            width: 100%;
            max-width: 480px;
        }
        
        .card-glass {
            background: rgba(19, 34, 55, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(46, 204, 113, 0.15);
            border-radius: 24px;
            padding: 2.5rem;
        }
        
        .form-control-custom {
            background: rgba(8, 14, 26, 0.8) !important;
            border: 1px solid rgba(46, 204, 113, 0.15) !important;
            color: #f0f4ff !important;
            padding: 12px 16px !important;
            border-radius: 12px !important;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        
        .form-control-custom:focus {
            border-color: #2ecc71 !important;
            box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.15) !important;
            background: rgba(8, 14, 26, 0.9) !important;
        }
        
        .form-control-custom::placeholder {
            color: #556688 !important;
        }
        
        .form-label {
            font-weight: 600;
            color: #a0b8d0;
            font-size: 0.9rem;
            margin-bottom: 6px;
        }
        
        .form-label .required {
            color: #ef4444;
        }
        
        .btn-primary-custom {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            transition: all 0.3s ease;
            font-size: 1rem;
        }
        
        .btn-primary-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(46, 204, 113, 0.3);
            color: #fff;
        }
        
        .btn-primary-custom:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .text-link {
            color: #2ecc71;
            text-decoration: none;
            font-weight: 600;
        }
        
        .text-link:hover {
            text-decoration: underline;
        }
        
        .logo-text {
            font-size: 1.8rem;
            font-weight: 800;
            color: #fff;
        }
        
        .logo-text span {
            color: #2ecc71;
        }
        
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            max-width: 400px;
        }
        
        .toast-custom {
            background: rgba(19, 34, 55, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(46, 204, 113, 0.2);
            border-radius: 16px;
            padding: 16px 20px;
            color: #f0f4ff;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.4s ease;
            margin-bottom: 10px;
        }
        
        .toast-custom.success {
            border-left: 4px solid #2ecc71;
        }
        
        .toast-custom.error {
            border-left: 4px solid #ef4444;
        }
        
        .toast-custom i {
            font-size: 1.5rem;
        }
        
        .toast-custom .toast-msg {
            flex: 1;
            font-size: 0.9rem;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .referral-notice {
            background: rgba(46, 204, 113, 0.05);
            border: 1px solid rgba(46, 204, 113, 0.1);
            border-radius: 12px;
            padding: 8px 12px;
            font-size: 0.8rem;
            color: #2ecc71;
            margin-top: 5px;
        }
        
        .referral-notice.active {
            border-color: rgba(46, 204, 113, 0.3);
            background: rgba(46, 204, 113, 0.08);
        }
        
        @media (max-width: 576px) {
            .card-glass {
                padding: 1.5rem;
            }
            .logo-text {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toastContainer"></div>

<!-- REGISTER FORM -->
<div class="register-container">
    <div class="card-glass">
        <div class="text-center mb-4">
            <div class="logo-text"><i class="bi bi-currency-bitcoin me-2"></i>RND<span>Staking</span></div>
            <p class="text-muted small">Create your account</p>
        </div>

        <form id="registerForm" novalidate>
            <div class="mb-3">
                <label class="form-label">Full Name <span class="required">*</span></label>
                <input type="text" id="regName" class="form-control form-control-custom" placeholder="Enter your full name" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email Address <span class="required">*</span></label>
                <input type="email" id="regEmail" class="form-control form-control-custom" placeholder="you@example.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password <span class="required">*</span></label>
                <input type="password" id="regPassword" class="form-control form-control-custom" placeholder="Min. 6 characters" required minlength="6">
            </div>
            <div class="mb-3">
                <label class="form-label">Referral Code <span style="font-size:0.65rem;background:rgba(46,204,113,0.15);color:#2ecc71;padding:2px 10px;border-radius:20px;font-weight:500;margin-left:6px;">Optional</span></label>
                <input type="text" id="regRef" class="form-control form-control-custom" placeholder="Enter referrer's User ID" style="background:#0a1425 !important;">
                <div class="referral-notice" id="referralNotice">
                    <i class="bi bi-info-circle me-1"></i> 
                    <span id="referralNoticeText">Enter referrer's User ID if you have one</span>
                </div>
            </div>
            <button type="submit" class="btn-primary-custom" id="registerBtn">Create Account <i class="bi bi-arrow-right ms-2"></i></button>
        </form>

        <p class="text-center mt-4 text-muted small">
            Already have an account? <a href="login.html" class="text-link">Login</a>
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

<script type="importmap">
{
    "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js",
        "firebase/storage": "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"
    }
}
</script>

<script type="module" src="register.js"></script>

</body>
</html>
